<style>
/* === TOKENS === */
:root {
  /* light default (ER-134) — glanceable paper surface */
  --mc-bg:        #f4f5f7;
  --mc-surface-1: #ffffff;
  --mc-surface-2: #eef0f4;
  --mc-surface-3: #e4e7ee;
  --mc-border:    #d5d9e2;
  --mc-border-2:  #b8bfcc;

  --mc-fg:        #1a1d24;
  --mc-fg-muted:  #5b6472;
  --mc-fg-dim:    #7a8494;

  --mc-accent:    #3b5bdb;
  --mc-accent-bg: #e8ecfb;
  --mc-accent-bd: #a8b6f0;

  --mc-green:  #0f8a5f;
  --mc-amber:  #b86e0a;
  --mc-red:    #c43c45;
  --mc-blue:   #2b7bb9;
  --mc-grey:   #7a8494;
  --mc-green-bg: #e6f6ef;
  --mc-amber-bg: #fbf3e0;
  --mc-red-bg:   #fcebec;
  --mc-blue-bg:  #e7f3fb;

  --mc-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --mc-mono: ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Code", Consolas, monospace;
  --mc-fs-1: 11.5px;
  --mc-fs-2: 13px;
  --mc-fs-3: 14px;
  --mc-fs-4: 16px;
  --mc-fs-5: 20px;
  --mc-fs-6: 26px;

  --mc-r-1: 6px;
  --mc-r-2: 9px;
  --mc-r-3: 13px;
  --mc-r-pill: 999px;

  --mc-sp-1: 4px;
  --mc-sp-2: 8px;
  --mc-sp-3: 12px;
  --mc-sp-4: 16px;
  --mc-sp-5: 24px;
  --mc-sp-6: 32px;
  --mc-sp-7: 48px;

  --mc-shadow: 0 1px 2px rgba(26,29,36,.06), 0 4px 16px -6px rgba(26,29,36,.10);
  --mc-shadow-lift: 0 2px 4px rgba(26,29,36,.08), 0 10px 28px -8px rgba(26,29,36,.14);
  --mc-ease: cubic-bezier(.22,.61,.36,1);
  --mc-dur: 160ms;
}
html[data-theme="dark"] {
  --mc-bg:        #0e1013;
  --mc-surface-1: #16181d;
  --mc-surface-2: #1d2027;
  --mc-surface-3: #262a33;
  --mc-border:    #23262e;
  --mc-border-2:  #313640;
  --mc-fg:        #edeef1;
  --mc-fg-muted:  #a7adba;
  --mc-fg-dim:    #737a88;
  --mc-accent:    #7c8cff;
  --mc-accent-bg: #191d33;
  --mc-accent-bd: #3a4270;
  --mc-green:  #35b98a;
  --mc-amber:  #e0a534;
  --mc-red:    #e5646a;
  --mc-blue:   #5aa9d6;
  --mc-grey:   #737a88;
  --mc-green-bg: #0f2a22;
  --mc-amber-bg: #2c2410;
  --mc-red-bg:   #2e1618;
  --mc-blue-bg:  #10222e;
  --mc-shadow: 0 1px 2px rgba(0,0,0,.30), 0 4px 16px -6px rgba(0,0,0,.45);
  --mc-shadow-lift: 0 2px 4px rgba(0,0,0,.35), 0 10px 28px -8px rgba(0,0,0,.55);
}
</style>

<style>
/* === LAYOUT CSS === */
/* selectors bind ONLY the mc-* class vocabulary. */
/* --- ER-134 glance Home --- */
.mc-theme-toggle {
  border: 1px solid var(--mc-border); background: var(--mc-surface-1); color: var(--mc-fg);
  border-radius: var(--mc-r-pill); padding: 4px 10px; font-size: var(--mc-fs-1); cursor: pointer;
}
.mc-theme-toggle:hover { border-color: var(--mc-border-2); background: var(--mc-surface-2); }
.mc-glance { max-width: 720px; margin: 0 auto; padding: var(--mc-sp-5) var(--mc-sp-5) var(--mc-sp-4); }
.mc-glance-title { font-size: var(--mc-fs-5); font-weight: 650; margin: 0 0 var(--mc-sp-3); color: var(--mc-fg); }
.mc-glance-card {
  background: var(--mc-surface-1); border: 1px solid var(--mc-border); border-radius: var(--mc-r-3);
  box-shadow: var(--mc-shadow); padding: var(--mc-sp-4); margin-bottom: var(--mc-sp-3);
}
.mc-glance-item { padding: var(--mc-sp-3) 0; border-top: 1px solid var(--mc-border); }
.mc-glance-item:first-child { border-top: 0; padding-top: 0; }
.mc-glance-q { font-size: var(--mc-fs-3); font-weight: 600; margin-bottom: var(--mc-sp-2); }
.mc-glance-opts { display: flex; flex-wrap: wrap; gap: var(--mc-sp-2); margin: var(--mc-sp-2) 0; }
.mc-opt {
  border: 1px solid var(--mc-border); background: var(--mc-surface-2); color: var(--mc-fg);
  border-radius: var(--mc-r-2); padding: 6px 10px; font-size: var(--mc-fs-2); cursor: pointer; text-align: left;
}
.mc-opt:hover { border-color: var(--mc-accent-bd); background: var(--mc-accent-bg); }
.mc-opt-suggested { border-color: var(--mc-accent); background: var(--mc-accent-bg); font-weight: 600; }
.mc-glance-suggested { color: var(--mc-fg-muted); font-size: var(--mc-fs-1); margin-top: var(--mc-sp-1); }
.mc-glance-health {
  display: flex; align-items: center; gap: var(--mc-sp-2); color: var(--mc-fg-muted);
  font-size: var(--mc-fs-2); margin: var(--mc-sp-3) 0;
}
.mc-expand-btn {
  border: 1px solid var(--mc-border); background: transparent; color: var(--mc-accent);
  border-radius: var(--mc-r-2); padding: 8px 12px; cursor: pointer; font-size: var(--mc-fs-2);
}
.mc-expand-btn:hover { background: var(--mc-accent-bg); }
.mc-home-depth { margin-top: var(--mc-sp-5); }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--mc-bg);
  color: var(--mc-fg);
  font-family: var(--mc-font);
  font-size: var(--mc-fs-2);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
.mc-num { font-variant-numeric: tabular-nums; }
.mc-mono { font-family: var(--mc-mono); }
.mc-card, .mc-table, .mc-strip, .mc-bar-track, .mc-svc { font-variant-numeric: tabular-nums; }
:focus-visible { outline: 2px solid var(--mc-accent); outline-offset: 2px; border-radius: var(--mc-r-1); }

/* --- global status strip --- */
.mc-strip {
  display: flex; align-items: center; gap: var(--mc-sp-2);
  flex-wrap: wrap;
  background: color-mix(in srgb, var(--mc-surface-1) 85%, transparent);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--mc-border);
  padding: var(--mc-sp-3) var(--mc-sp-5);
  position: sticky; top: 0; z-index: 10;
}
.mc-strip-seg {
  display: inline-flex; align-items: center; gap: var(--mc-sp-2);
  background: transparent; border: 1px solid transparent;
  border-radius: var(--mc-r-pill);
  padding: var(--mc-sp-1) var(--mc-sp-3);
  cursor: pointer; color: var(--mc-fg);
  font-size: var(--mc-fs-2); font-weight: 500;
  transition: background var(--mc-dur) var(--mc-ease), border-color var(--mc-dur) var(--mc-ease);
}
.mc-strip-seg:hover { background: var(--mc-surface-2); border-color: var(--mc-border-2); }
.mc-strip-seg-label { color: var(--mc-fg-muted); font-weight: 400; }
.mc-strip-spacer { flex: 1 1 auto; }
.mc-strip-meta {
  display: inline-flex; align-items: center; gap: var(--mc-sp-3);
  color: var(--mc-fg-dim); font-size: var(--mc-fs-1);
}
.mc-strip-dots { display: inline-flex; gap: 5px; align-items: center; }

/* --- dots + glyphs (never color alone: glyph always paired) --- */
.mc-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--mc-grey); flex: none;
  box-shadow: 0 0 0 3px color-mix(in srgb, currentColor 14%, transparent);
}
.mc-glyph { font-weight: 700; font-family: var(--mc-mono); }
.mc-state-green  { color: var(--mc-green); }
.mc-state-amber  { color: var(--mc-amber); }
.mc-state-red    { color: var(--mc-red); }
.mc-state-blue   { color: var(--mc-blue); }
.mc-state-grey   { color: var(--mc-grey); }
.mc-dot.mc-state-green { background: var(--mc-green); color: var(--mc-green); }
.mc-dot.mc-state-amber { background: var(--mc-amber); color: var(--mc-amber); }
.mc-dot.mc-state-red   { background: var(--mc-red); color: var(--mc-red); }
.mc-dot.mc-state-blue  { background: var(--mc-blue); color: var(--mc-blue); }
.mc-dot.mc-state-grey  { background: var(--mc-grey); color: var(--mc-grey); }

/* --- nav tabs (underline-active, accent) --- */
.mc-nav {
  display: flex; gap: var(--mc-sp-1);
  padding: 0 var(--mc-sp-5);
  border-bottom: 1px solid var(--mc-border);
  background: color-mix(in srgb, var(--mc-bg) 88%, transparent);
  backdrop-filter: blur(8px);
  position: sticky; top: 49px; z-index: 9;
}
.mc-tab {
  position: relative;
  padding: var(--mc-sp-3) var(--mc-sp-3);
  color: var(--mc-fg-muted); cursor: pointer;
  text-decoration: none; font-size: var(--mc-fs-3); font-weight: 500;
  transition: color var(--mc-dur) var(--mc-ease);
}
.mc-tab::after {
  content: ""; position: absolute; left: var(--mc-sp-3); right: var(--mc-sp-3); bottom: -1px;
  height: 2px; border-radius: 2px 2px 0 0; background: transparent;
  transition: background var(--mc-dur) var(--mc-ease);
}
.mc-tab:hover { color: var(--mc-fg); }
.mc-tab.mc-tab-active { color: var(--mc-fg); }
.mc-tab.mc-tab-active::after { background: var(--mc-accent); }

/* --- main --- */
.mc-main { padding: var(--mc-sp-6) var(--mc-sp-5) var(--mc-sp-7); max-width: 1160px; margin: 0 auto; }
.mc-section-head {
  display: flex; align-items: baseline; gap: var(--mc-sp-3);
  margin: var(--mc-sp-6) 0 var(--mc-sp-3);
}
.mc-section-head:first-child { margin-top: 0; }
.mc-section-head h2 { font-size: var(--mc-fs-4); margin: 0; font-weight: 600; letter-spacing: -0.01em; }
.mc-age { color: var(--mc-fg-dim); font-size: var(--mc-fs-1); cursor: help; }

/* --- banners --- */
.mc-banner {
  border-radius: var(--mc-r-2); padding: var(--mc-sp-2) var(--mc-sp-3);
  margin: var(--mc-sp-2) 0; font-size: var(--mc-fs-2);
  border: 1px solid var(--mc-border);
}
.mc-banner-red   { background: var(--mc-red-bg);   border-color: color-mix(in srgb, var(--mc-red) 45%, transparent);   color: var(--mc-fg); }
.mc-banner-amber { background: var(--mc-amber-bg); border-color: color-mix(in srgb, var(--mc-amber) 45%, transparent); color: var(--mc-fg); }
.mc-banner-blue  { background: var(--mc-blue-bg);  border-color: color-mix(in srgb, var(--mc-blue) 45%, transparent);  color: var(--mc-fg); }

/* stale feed desaturates so a frozen green dot can't lie */
.mc-desaturated { filter: saturate(0.25) opacity(0.72); }

/* --- summary cards --- */
.mc-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: var(--mc-sp-4); }
.mc-card {
  background: var(--mc-surface-1); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-3); padding: var(--mc-sp-4) var(--mc-sp-4) var(--mc-sp-3);
  box-shadow: var(--mc-shadow);
  transition: border-color var(--mc-dur) var(--mc-ease), box-shadow var(--mc-dur) var(--mc-ease);
}
.mc-card:hover { border-color: var(--mc-border-2); box-shadow: var(--mc-shadow-lift); }
.mc-card-title { color: var(--mc-fg-muted); font-size: var(--mc-fs-2); font-weight: 500; display: flex; align-items: center; gap: var(--mc-sp-2); }
.mc-card-headline { font-size: var(--mc-fs-6); font-weight: 650; letter-spacing: -0.02em; margin: var(--mc-sp-2) 0 2px; }
.mc-card-secondary { color: var(--mc-fg-muted); font-size: var(--mc-fs-2); line-height: 1.7; }
.mc-card-foot { color: var(--mc-fg-dim); font-size: var(--mc-fs-1); margin-top: var(--mc-sp-2); }
.mc-pulse {
  display: inline-block; background: var(--mc-accent-bg); color: var(--mc-accent);
  border: 1px solid var(--mc-accent-bd); border-radius: var(--mc-r-pill);
  padding: 1px var(--mc-sp-2); font-size: var(--mc-fs-1); font-weight: 500; margin-left: var(--mc-sp-2);
}
.mc-provenance {
  display: flex; flex-wrap: wrap; gap: var(--mc-sp-2);
  margin: 0 0 var(--mc-sp-3);
}
.mc-provenance .mc-chip { background: var(--mc-surface-1); }
.mc-provenance-label { color: var(--mc-fg-dim); }

/* --- needs-attention list --- */
.mc-attention { display: flex; flex-direction: column; gap: var(--mc-sp-2); margin: var(--mc-sp-2) 0 var(--mc-sp-6); }
.mc-row {
  display: flex; align-items: center; gap: var(--mc-sp-3);
  background: var(--mc-surface-1); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-2); padding: var(--mc-sp-3) var(--mc-sp-4);
  box-shadow: var(--mc-shadow);
  transition: border-color var(--mc-dur) var(--mc-ease), transform var(--mc-dur) var(--mc-ease);
}
.mc-row:hover { border-color: var(--mc-border-2); transform: translateY(-1px); }
.mc-row-body { flex: 1 1 auto; min-width: 0; }
.mc-row-problem { font-size: var(--mc-fs-3); font-weight: 500; }
.mc-row-action { color: var(--mc-fg-muted); font-size: var(--mc-fs-2); margin-top: 1px; }
.mc-row-meta { color: var(--mc-fg-dim); font-size: var(--mc-fs-1); margin-top: 2px; }
.mc-jump {
  color: var(--mc-accent); cursor: pointer; text-decoration: none;
  font-size: var(--mc-fs-2); font-weight: 500; white-space: nowrap; flex: none;
  padding: var(--mc-sp-1) var(--mc-sp-2); border-radius: var(--mc-r-1);
  transition: background var(--mc-dur) var(--mc-ease);
}
.mc-jump:hover { background: var(--mc-accent-bg); }
.mc-allgreen {
  display: flex; align-items: center; gap: var(--mc-sp-3);
  background: var(--mc-surface-1); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-3); padding: var(--mc-sp-5) var(--mc-sp-5);
  box-shadow: var(--mc-shadow); color: var(--mc-fg-muted);
}

/* --- generic truncation (CSS only, never JS slicing) --- */
.mc-ellipsis { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* --- filters bar --- */
.mc-filters { display: flex; gap: var(--mc-sp-2); flex-wrap: wrap; align-items: center; margin: var(--mc-sp-3) 0; }
.mc-chip {
  display: inline-flex; align-items: center; gap: var(--mc-sp-1);
  background: var(--mc-surface-2); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-pill); padding: 3px var(--mc-sp-3); font-size: var(--mc-fs-1);
  color: var(--mc-fg-muted);
}
.mc-chip-btn { cursor: pointer; transition: background var(--mc-dur) var(--mc-ease), border-color var(--mc-dur) var(--mc-ease), color var(--mc-dur) var(--mc-ease); }
.mc-chip-btn:hover { border-color: var(--mc-border-2); color: var(--mc-fg); }
.mc-chip-on { background: var(--mc-accent-bg); border-color: var(--mc-accent-bd); color: var(--mc-accent); }
.mc-badge {
  display: inline-flex; align-items: center; border-radius: var(--mc-r-pill);
  padding: 1px var(--mc-sp-2); font-size: var(--mc-fs-1); font-weight: 500;
  border: 1px solid var(--mc-border-2); color: var(--mc-fg-muted);
}
.mc-badge-worker { background: var(--mc-accent-bg); color: var(--mc-accent); border-color: var(--mc-accent-bd); }
.mc-badge-audit  { background: var(--mc-amber-bg); color: var(--mc-amber); border-color: color-mix(in srgb, var(--mc-amber) 40%, transparent); }
.mc-badge-live   { background: var(--mc-green-bg); color: var(--mc-green); border-color: color-mix(in srgb, var(--mc-green) 40%, transparent); }
.mc-badge-stale  { background: var(--mc-surface-3); color: var(--mc-fg-dim); border-color: transparent; }

/* --- tables --- */
.mc-table { width: 100%; border-collapse: collapse; font-size: var(--mc-fs-2); }
.mc-table th {
  text-align: left; color: var(--mc-fg-dim); font-weight: 500;
  border-bottom: 1px solid var(--mc-border); padding: var(--mc-sp-2) var(--mc-sp-3);
  font-size: var(--mc-fs-1);
}
.mc-table td { padding: var(--mc-sp-2) var(--mc-sp-3); border-bottom: 1px solid var(--mc-border); vertical-align: middle; }
.mc-table tr:last-child td { border-bottom: none; }
.mc-table tr:hover td { background: var(--mc-surface-1); }
.mc-panel-table {
  background: var(--mc-surface-1); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-3); box-shadow: var(--mc-shadow); overflow: hidden;
}
.mc-action-verb { color: var(--mc-amber); font-size: var(--mc-fs-1); font-weight: 500; white-space: nowrap; }
.mc-collapse {
  cursor: pointer; color: var(--mc-fg-muted); font-size: var(--mc-fs-2);
  padding: var(--mc-sp-3) 0; user-select: none;
  transition: color var(--mc-dur) var(--mc-ease);
}
.mc-collapse:hover { color: var(--mc-fg); }

/* --- flat rows / clusters (chats) --- */
.mc-list { display: flex; flex-direction: column; gap: var(--mc-sp-2); }
.mc-chatrow {
  display: flex; align-items: center; gap: var(--mc-sp-2); flex-wrap: wrap;
  background: var(--mc-surface-1); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-2); padding: var(--mc-sp-3) var(--mc-sp-4);
  box-shadow: var(--mc-shadow);
  transition: border-color var(--mc-dur) var(--mc-ease);
}
.mc-chatrow:hover { border-color: var(--mc-border-2); }
.mc-chatrow-title { font-weight: 600; font-size: var(--mc-fs-3); max-width: 360px; }
.mc-provider { font-size: var(--mc-fs-1); color: var(--mc-fg-muted); }
.mc-repo { font-size: var(--mc-fs-1); color: var(--mc-fg-dim); }
.mc-cmd {
  display: inline-flex; align-items: center; gap: var(--mc-sp-1);
  font-family: var(--mc-mono); font-size: var(--mc-fs-1);
  background: var(--mc-surface-2); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-1); padding: 2px var(--mc-sp-2);
  color: var(--mc-fg-muted); max-width: 320px;
}
.mc-copy { cursor: pointer; color: var(--mc-accent); border: none; background: none; font-size: var(--mc-fs-1); padding: 0; font-weight: 500; }
.mc-edge-label {
  color: var(--mc-fg-dim); font-size: var(--mc-fs-1); font-weight: 500;
  border: 1px solid var(--mc-border); border-radius: var(--mc-r-pill);
  padding: 0 var(--mc-sp-2); flex: none;
}
.mc-edge-weak .mc-edge-label { border-style: dashed; border-color: var(--mc-amber); color: var(--mc-amber); }
.mc-indent-1 { margin-left: var(--mc-sp-4); }
.mc-indent-2 { margin-left: var(--mc-sp-6); }

/* --- usage bars --- */
.mc-bar-track {
  background: var(--mc-surface-3); border-radius: var(--mc-r-pill);
  height: 8px; overflow: hidden; flex: 1 1 auto; min-width: 120px;
}
.mc-bar-fill { height: 100%; width: var(--mc-w, 0%); background: var(--mc-accent); border-radius: var(--mc-r-pill); transition: width 400ms var(--mc-ease); }
.mc-bar-fill.mc-state-green { background: var(--mc-green); }
.mc-bar-fill.mc-state-amber { background: var(--mc-amber); }
.mc-bar-fill.mc-state-red   { background: var(--mc-red); }
.mc-usage-row { display: flex; align-items: center; gap: var(--mc-sp-3); padding: var(--mc-sp-2) 0; }
.mc-run-strip { display: inline-flex; align-items: center; gap: 5px; margin: var(--mc-sp-1) 0; }
.mc-usage-name { width: 140px; flex: none; font-size: var(--mc-fs-2); }
.mc-pace { color: var(--mc-amber); font-size: var(--mc-fs-2); }
.mc-countdown { font-family: var(--mc-mono); font-size: var(--mc-fs-1); color: var(--mc-fg-muted); }
.mc-decision-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(255px, 1fr)); gap: var(--mc-sp-3); }
.mc-decision-top { display: flex; align-items: flex-start; gap: var(--mc-sp-2); }
.mc-decision-title { font-size: var(--mc-fs-3); font-weight: 650; }
.mc-decision-state { margin-left: auto; white-space: nowrap; }
.mc-kpi { font-size: var(--mc-fs-5); font-weight: 650; letter-spacing: -0.02em; margin: var(--mc-sp-2) 0 0; }
.mc-next-action { color: var(--mc-fg); font-size: var(--mc-fs-2); margin-top: var(--mc-sp-2); }
.mc-mini-stack { display: flex; flex-direction: column; gap: 2px; margin-top: var(--mc-sp-2); }

/* --- session monitor + heatmap --- */
.mc-session-table td:last-child, .mc-session-table th:last-child { text-align: right; }
.mc-heat-wrap { display: flex; flex-direction: column; gap: var(--mc-sp-2); }
.mc-heatframe { display: grid; grid-template-columns: auto 1fr; gap: var(--mc-sp-2); align-items: start; }
.mc-heatmap {
  display: grid;
  grid-auto-flow: column;
  grid-template-rows: repeat(7, 14px);
  gap: 4px;
  align-content: start;
}
.mc-heat-cell {
  width: 14px; height: 14px; border-radius: 4px;
  background: var(--mc-surface-3); border: 1px solid transparent;
}
.mc-heat-l1 { background: #173427; }
.mc-heat-l2 { background: #20523b; }
.mc-heat-l3 { background: #2b7a58; }
.mc-heat-l4 { background: #35b98a; }
.mc-heat-open { border-color: var(--mc-amber); }
.mc-heat-empty { background: transparent; border-color: transparent; }
.mc-weekdays { display: grid; grid-template-rows: repeat(7, 14px); gap: 4px; }
.mc-weekdays span { color: var(--mc-fg-dim); font-size: 10px; line-height: 14px; text-align: right; padding-right: 2px; }

/* --- automation service cards --- */
.mc-svc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: var(--mc-sp-3); }
.mc-svc {
  background: var(--mc-surface-1); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-2); padding: var(--mc-sp-4);
  box-shadow: var(--mc-shadow);
  transition: border-color var(--mc-dur) var(--mc-ease);
}
.mc-svc:hover { border-color: var(--mc-border-2); }
.mc-svc-head { display: flex; align-items: center; gap: var(--mc-sp-2); }
.mc-svc-name { font-weight: 600; font-size: var(--mc-fs-3); flex: 1 1 auto; }
.mc-drawer {
  margin-top: var(--mc-sp-2); font-family: var(--mc-mono);
  font-size: var(--mc-fs-1); color: var(--mc-red);
  white-space: pre-wrap; word-break: break-word;
  background: var(--mc-red-bg); border-radius: var(--mc-r-1); padding: var(--mc-sp-2);
}

.mc-row-click { cursor: pointer; }
/* --- connection map (cytoscape) --- */
.mc-map-legend { display: flex; flex-wrap: wrap; gap: var(--mc-sp-3); margin: var(--mc-sp-3) 0; }
.mc-legend-item { display: inline-flex; align-items: center; gap: var(--mc-sp-2); font-size: var(--mc-fs-1); color: var(--mc-fg-muted); }
.mc-legend-line { width: 20px; height: 0; border-top: 3px solid var(--mc-fg-dim); flex: none; }
.mc-map-wrap { display: grid; grid-template-columns: 1fr 300px; gap: var(--mc-sp-3); }
@media (max-width: 860px) { .mc-map-wrap { grid-template-columns: 1fr; } }
.mc-graph {
  height: 68vh; min-height: 460px;
  background:
    radial-gradient(circle at 20px 20px, var(--mc-border) 1px, transparent 1px) 0 0 / 32px 32px,
    var(--mc-surface-1);
  border: 1px solid var(--mc-border); border-radius: var(--mc-r-3);
  box-shadow: var(--mc-shadow); overflow: hidden;
}
.mc-map-side {
  background: var(--mc-surface-1); border: 1px solid var(--mc-border);
  border-radius: var(--mc-r-3); box-shadow: var(--mc-shadow);
  padding: var(--mc-sp-4); align-self: start; max-height: 68vh; overflow: auto;
}
.mc-map-summary { background: var(--mc-surface-2); border: 1px solid var(--mc-border); border-radius: var(--mc-r-2); padding: var(--mc-sp-3); margin-bottom: var(--mc-sp-3); }
.mc-side-title { font-size: var(--mc-fs-3); font-weight: 650; letter-spacing: -0.01em; margin-bottom: var(--mc-sp-1); }
.mc-side-meta { color: var(--mc-fg-muted); font-size: var(--mc-fs-1); margin-bottom: var(--mc-sp-3); }
.mc-side-section { font-size: var(--mc-fs-1); color: var(--mc-fg-dim); text-transform: none; margin: var(--mc-sp-3) 0 var(--mc-sp-1); }
.mc-side-conn { display: flex; align-items: flex-start; gap: var(--mc-sp-2); font-size: var(--mc-fs-2); padding: var(--mc-sp-1) 0; color: var(--mc-fg-muted); cursor: pointer; }
.mc-side-conn:hover { color: var(--mc-fg); }
.mc-side-conn-body { min-width: 0; flex: 1 1 auto; }
.mc-side-conn-meta { display: flex; flex-wrap: wrap; gap: var(--mc-sp-1); margin-top: 2px; }
.mc-btn {
  display: inline-flex; align-items: center; gap: var(--mc-sp-1); cursor: pointer;
  background: var(--mc-surface-2); border: 1px solid var(--mc-border-2); color: var(--mc-fg);
  border-radius: var(--mc-r-2); padding: var(--mc-sp-2) var(--mc-sp-3); font-size: var(--mc-fs-2); font-weight: 500;
  margin: var(--mc-sp-1) var(--mc-sp-1) 0 0; font-family: var(--mc-font);
  transition: background var(--mc-dur) var(--mc-ease), border-color var(--mc-dur) var(--mc-ease);
}
.mc-btn:hover { background: var(--mc-surface-3); border-color: var(--mc-accent-bd); }
.mc-btn-primary { background: var(--mc-accent-bg); border-color: var(--mc-accent-bd); color: var(--mc-accent); }
.mc-map-note { color: var(--mc-fg-dim); font-size: var(--mc-fs-1); margin-top: var(--mc-sp-2); }

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}
</style>
</head>

<body>
<div class="mc-strip" id="mc-strip"></div>
<nav class="mc-nav" id="mc-nav"></nav>
<main class="mc-main" id="mc-main"></main>

<script>
// === RENDERERS ===
(function () {
  "use strict";
  var MC = window.MC || (window.MC = { feeds: {} });
  MC.feeds = MC.feeds || {};
  MC.feedErrors = MC.feedErrors || {};

  var LOAD_EPOCH = Math.floor(Date.now() / 1000);
  function nowS() { return Math.floor(Date.now() / 1000); }
  // Epoch of 00:00 local on the day AFTER `sec`'s local day — a daily product's
  // validity horizon. new Date(y, mon, day+1) normalizes the rollover and picks
  // the right local/DST offset, mirroring Python next_local_midnight (mktime).
  function nextLocalMidnight(sec) {
    var d = new Date(sec * 1000);
    return Math.floor(new Date(d.getFullYear(), d.getMonth(), d.getDate() + 1, 0, 0, 0, 0).getTime() / 1000);
  }

  // --- display-time redaction (mirrors scripts/search-transcripts _SECRET_RE) -
  // transcript-derived text (titles, open-end text, err-log tails) is untrusted;
  // strip secrets before display even though textContent already blocks injection.
  var SECRET_RE = new RegExp(
    "(sk-ant-(?:api|oat)\\d{2}-[A-Za-z0-9_-]*" +
    "|sk-[A-Za-z0-9_-]{20,}" +
    "|AIza[0-9A-Za-z_-]{35}" +
    "|ya29\\.[0-9A-Za-z._-]+" +
    "|ghp_[A-Za-z0-9]{20,}|gho_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}" +
    "|xox[baprs]-[A-Za-z0-9-]{10,}" +
    "|AKIA[0-9A-Z]{16}" +
    "|eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9_-]{10,}" +
    "|(?:[Bb][Ee][Aa][Rr][Ee][Rr])\\s+[A-Za-z0-9._-]{16,})", "g");
  function redact(s) { return String(s).replace(SECRET_RE, "«REDACTED-SECRET»"); }
  function redactDeep(x) {
    if (typeof x === "string") return redact(x);
    if (Array.isArray(x)) return x.map(redactDeep);
    if (x && typeof x === "object") { var o = {}; for (var k in x) if (x.hasOwnProperty(k)) o[k] = redactDeep(x[k]); return o; }
    return x;
  }
  // redact every feed's display text once at load — one choke point, all render paths covered
  for (var _f in MC.feeds) if (MC.feeds.hasOwnProperty(_f)) MC.feeds[_f] = redactDeep(MC.feeds[_f]);
  for (var _e in MC.feedErrors) if (MC.feedErrors.hasOwnProperty(_e)) MC.feedErrors[_e] = redactDeep(MC.feedErrors[_e]);

  // --- tiny DOM helper: all text via textContent, never raw HTML injection ---
  function h(tag, attrs) {
    var el = document.createElement(tag);
    if (attrs) {
      for (var k in attrs) {
        if (!attrs.hasOwnProperty(k)) continue;
        var v = attrs[k];
        if (v == null) continue;
        if (k === "class") el.className = v;
        else if (k === "text") el.textContent = v;
        else if (k === "title") el.title = v;
        else if (k === "style") el.setAttribute("style", v);
        else if (k.slice(0, 2) === "on" && typeof v === "function") el.addEventListener(k.slice(2), v);
        else el.setAttribute(k, v);
      }
    }
    for (var i = 2; i < arguments.length; i++) {
      var kid = arguments[i];
      if (kid == null || kid === false) continue;
      if (Array.isArray(kid)) { for (var j = 0; j < kid.length; j++) if (kid[j] != null) el.appendChild(nodeOf(kid[j])); }
      else el.appendChild(nodeOf(kid));
    }
    return el;
  }
  function nodeOf(x) { return typeof x === "string" || typeof x === "number" ? document.createTextNode(String(x)) : x; }

  // --- state glyphs (never color alone) --------------------------------------
  var GLYPH = { green: "✓", amber: "!", yellow: "!", red: "✕", blue: "○",
                grey: "○", never: "○", retired: "⏸", "offline-media": "◐", degraded: "◍",
                "awaiting-activation": "○" };
  var STATE_CLASS = { green: "mc-state-green", amber: "mc-state-amber", yellow: "mc-state-amber",
                      red: "mc-state-red", blue: "mc-state-blue", grey: "mc-state-grey",
                      never: "mc-state-grey", retired: "mc-state-grey",
                      "offline-media": "mc-state-blue", degraded: "mc-state-amber",
                      "awaiting-activation": "mc-state-grey" };
  function glyphSpan(state) {
    return h("span", { class: "mc-glyph " + (STATE_CLASS[state] || "mc-state-grey"),
                       title: state }, GLYPH[state] || "○");
  }
  function dot(state) { return h("span", { class: "mc-dot " + (STATE_CLASS[state] || "mc-state-grey"), title: state }); }

  // --- age formatting (CSS ellipsis only elsewhere; here numeric only) -------
  function fmtAge(epoch) {
    var s = nowS() - epoch;
    if (s < 0) return "clock skew";
    if (s < 60) return s + "s ago";
    if (s < 3600) return Math.floor(s / 60) + "m ago";
    if (s < 86400) return Math.floor(s / 3600) + "h ago";
    return Math.floor(s / 86400) + "d ago";
  }
  function absTime(epoch) {
    try { return new Date(epoch * 1000).toISOString(); } catch (e) { return String(epoch); }
  }
  function ageSpan(epoch) {
    return h("span", { class: "mc-age", title: absTime(epoch) }, fmtAge(epoch));
  }

  // --- per-feed guard: schema/staleness/skew ---------------------------------
  var EXPECTED_CADENCE = { automation: 300, usage: 1800, git: 900,
                           chats: 1800, decisions: 300, brief: 300 };
  function guard(name) {
    var env = MC.feeds[name];
    var currentError = MC.feedErrors[name];
    if (!env || typeof env !== "object" || Array.isArray(env)) {
      if (currentError && currentError.ok === false) {
        return { ok: false, reason: currentError.error || "feeder error", env: null, hard: true };
      }
      return { ok: false, reason: "no data source", env: null };
    }
    if (env.schema !== 1) return { ok: false, reason: "unsupported schema " + env.schema + " — keeping last good", env: env, hard: true };
    var cadenceValid = typeof env.cadence_s === "number" && isFinite(env.cadence_s) &&
      env.cadence_s > 0 && Math.floor(env.cadence_s) === env.cadence_s &&
      env.cadence_s === EXPECTED_CADENCE[name];
    var dataValid = env.data && typeof env.data === "object" && !Array.isArray(env.data);
    if (typeof env.ok !== "boolean" || !cadenceValid || (env.ok && !dataValid)) {
      return { ok: false, reason: "malformed feed envelope", env: env, hard: true };
    }
    var epochValid = typeof env.generated_epoch === "number" &&
      isFinite(env.generated_epoch) && Math.floor(env.generated_epoch) === env.generated_epoch;
    var epoch = epochValid ? env.generated_epoch : 0;
    var cadence = env.cadence_s;
    var hasValidUntil = env.valid_until !== undefined && env.valid_until !== null;
    var validUntilValid = !hasValidUntil || (typeof env.valid_until === "number" &&
      isFinite(env.valid_until) && Math.floor(env.valid_until) === env.valid_until);
    var validUntil = hasValidUntil && validUntilValid ? env.valid_until : 0;
    var age = nowS() - epoch;
    // A daily product's validity horizon is exactly the next local midnight after
    // its compose epoch (<=~24h, ~25h across fall-back DST). A valid_until beyond
    // that is malformed (a 47h value, or a 30h-old brief still claiming validity)
    // and must NOT suppress staleness, so it is honored only up to that per-day
    // boundary — not a flat 2-day slab. Mirrors feed_health / next_local_midnight.
    var validOk = validUntil && epoch && validUntil <= nextLocalMidnight(epoch);
    var flag = null;
    if (!epochValid || !validUntilValid) flag = "stale";
    else if (age < 0) flag = "skew";
    // A present valid_until is a HARD expiry: once now reaches it, an expired
    // daily brief reads stale immediately, regardless of the poll cadence.
    else if (validUntil && nowS() >= validUntil) flag = "stale";
    // A daily product (valid_until set) stays fresh for its whole valid day
    // instead of aging out on the poll cadence.
    else if (validOk && nowS() < validUntil) flag = null;
    // Mirror feed_health's dashboard ladder exactly: one missed cadence is an
    // amber aging warning; only >6x cadence is stale/red. Boundary comparisons
    // are strict on both sides (1x and 6x remain in the younger state).
    else if (cadence && age > 6 * cadence) flag = "stale";
    else if (cadence && age > cadence) flag = "aging";
    var feedError = env.ok === false ? (env.error || "feeder error") : null;
    if (currentError && currentError.ok === false &&
        (+currentError.generated_epoch || 0) >= epoch) {
      feedError = currentError.error || "feeder error";
    }
    return { ok: true, env: env, data: env.data, epoch: epoch, cadence: cadence, age: age,
             flag: flag, feedError: feedError };
  }
  var TONE_RANK = { green: 0, grey: 1, amber: 2, red: 3 };
  function worstTone(a, b) {
    return (TONE_RANK[b] || 0) > (TONE_RANK[a] || 0) ? b : a;
  }
  function guardTone(g) {
    if (!g || !g.ok) return "grey";
    if (g.feedError || g.flag === "stale") return "red";
    if (g.flag === "skew" || g.flag === "aging") return "amber";
    return "green";
  }
  function guardStatusLine(g) {
    if (!g || !g.ok) return null;
    if (g.feedError) return "last refresh had a problem";
    if (g.flag === "stale") return "feed data is stale";
    if (g.flag === "aging") return "feed data is aging";
    if (g.flag === "skew") return "clock skew: feed timestamp is in the future";
    return null;
  }
  // a panel wrapper: banner(s) + optional desaturation + data-age
  function panel(g, titleText) {
    var wrap = h("section", { class: "mc-panel" });
    var head = h("div", { class: "mc-section-head" }, h("h2", { text: titleText }));
    if (g.ok) head.appendChild(ageSpan(g.epoch));
    wrap.appendChild(head);
    if (!g.ok) {
      wrap.appendChild(h("div", { class: "mc-banner mc-banner-red" }, g.reason));
      return { wrap: wrap, body: null };
    }
    if (g.feedError) wrap.appendChild(h("div", { class: "mc-banner mc-banner-red" }, "Data refresh problem: " + g.feedError + " — showing last good data"));
    if (g.flag === "skew") wrap.appendChild(h("div", { class: "mc-banner mc-banner-amber" }, "clock skew: this feed's timestamp is in the future"));
    else if (g.flag === "stale") wrap.appendChild(h("div", { class: "mc-banner mc-banner-amber" }, "Data is older than expected — treat this tab as a warning, not the latest truth."));
    else if (g.flag === "aging") wrap.appendChild(h("div", { class: "mc-banner mc-banner-amber" }, "Data is aging — refresh before treating this tab as current."));
    var body = h("div", { class: (g.flag === "stale" || g.flag === "aging") ? "mc-desaturated" : "" });
    wrap.appendChild(body);
    return { wrap: wrap, body: body };
  }

  // --- clipboard affordance (file:// tolerant) -------------------------------
  function copyable(cmd, label) {
    var code = label
      ? h("span", { class: "mc-ellipsis" }, label)
      : h("code", { class: "mc-ellipsis" }, cmd);
    var btn = h("button", { class: "mc-copy", title: "copy", onclick: function () {
      try {
        if (navigator.clipboard) navigator.clipboard.writeText(cmd);
        btn.textContent = "copied";
        setTimeout(function () { btn.textContent = "copy"; }, 1200);
      } catch (e) { btn.textContent = "select"; }
    } }, "copy");
    return h("span", { class: "mc-cmd", title: cmd }, code, btn);
  }

  // --- plain-words helpers ---------------------------------------------------
  function humanJobState(s) {
    return { red: "stopped or failing", degraded: "running rough", yellow: "running late",
             "offline-media": "waiting on the external drive",
             "awaiting-activation": "awaiting activation" }[s] || s;
  }
  function providerLabel(p) {
    return { claude: "Claude", codex: "Codex", cursor: "Cursor", copilot: "Copilot",
             hermes: "Hermes", chatgpt: "ChatGPT", glm: "GLM", repo: "Repo", unknown: "AI unknown" }[providerGroup(p)] || "AI unknown";
  }
  function providerGroup(p) {
    var key = String(p || "").toLowerCase();
    return { claude: 1, codex: 1, cursor: 1, copilot: 1, hermes: 1,
             chatgpt: 1, glm: 1, repo: 1 }[key] ? key : "unknown";
  }
  function titleLabel(title, id) {
    var s = String(title || "").trim();
    if (/^Spawned-by:/i.test(s)) return "Worker chat";
    if (/^Codex Companion Task/i.test(s)) return "Codex review task";
    if (/^USAGE-BURST-CODEX-PREFLIGHT-CHECK/i.test(s)) return "Usage preflight check";
    if (!s) return id ? "(untitled) " + String(id).slice(0, 8) : "(untitled)";
    return s;
  }
  function confidenceLabel(c) {
    return { live: "fresh reading", stale: "old reading", estimated: "estimated", manual: "manual",
             unknown: "unknown", absent: "not connected" }[String(c || "").toLowerCase()] || String(c || "estimated");
  }
  function sourceLabel(s) {
    var key = String(s || "").toLowerCase();
    if (key.indexOf("rollout-rate_limits") === 0) return "local rate-limit log";
    if (key.indexOf("ccusage-blocks") === 0) return "Claude local block estimate";
    if (key.indexOf("ccusage-weekly") === 0) return "Claude weekly estimate";
    if (key.indexOf("claude-glm-doctor") === 0) return "GLM doctor health check";
    if (key.indexOf("session-store") === 0) return "local Copilot store";
    if (key.indexOf("binary") === 0) return "local binary check";
    if (key.indexOf("credits.json") === 0) return "held credits file";
    if (key.indexOf("spawn_header") === 0) return "spawn header";
    return { rollout: "local tally", ccusage: "local estimate", doctor: "health check", manual: "manual note",
             none: "not captured", delegations: "delegation log", mailbox: "mailbox log", scan: "transcript scan",
             titles: "title inference", "resume-fork": "resume history" }[key] || String(s || "local feed");
  }
  function openEndHuman(oe) {
    if (!oe) return "one item left to finish";
    if (oe.kind === "register_unverified") return "waiting to confirm a tracked change";
    if (oe.kind === "todo_open") return "todo item: " + String(oe.text || "").replace(/^[^:]+:\s*/, "");
    if (oe.kind === "repo_dirty") return "Git needs a decision";
    if (oe.kind === "register_open") return "tracked request still open";
    if (oe.kind === "nightly_finding") return "nightly note needs review";
    var t = String(oe.text || "").replace(/^\s*(ER|GR|HB|HR)-\d{3}[:\s-]*/i, "").trim();
    if (oe.kind === "closeout_handoff") return t ? "handoff: " + t : "handoff wasn't finished";
    return t || "one item left to finish";
  }
  function nodeKey(n) {
    return String(n.id || "").indexOf((n.provider || "") + ":") === 0 ? n.id : (n.provider || "") + ":" + n.id;
  }
  function looseKindLabel(k) {
    return {
      closeout_handoff: "unfinished handoff",
      register_unverified: "needs verification",
      todo_open: "todo item",
      nightly_finding: "nightly note",
      repo_dirty: "Git decision",
      register_open: "tracked request"
    }[k] || "open item";
  }
  function looseSeverityState(s) {
    return { red: "red", amber: "amber", yellow: "amber", grey: "grey", green: "green" }[String(s || "").toLowerCase()] || "amber";
  }
  function looseEnds(data) {
    data = data || {};
    var nodes = data.nodes || [], byKey = {};
    nodes.forEach(function (n) { byKey[nodeKey(n)] = n; });
    if (Array.isArray(data.loose_ends)) {
      return data.loose_ends.map(function (x) {
        var item = Object.assign({}, x || {});
        var n = byKey[item.source_node || ""];
        if (n) {
          item.title = titleLabel(item.title || (n && n.title), n && n.id);
          item.repo = item.repo || n.repo || "";
          item.provider = item.provider || n.provider || "";
        }
        item.id = item.id || ((item.source_node || "unknown") + ":" + (item.text_hash || item.text || ""));
        item.action_hint = item.action_hint || openEndHuman(item);
        item.severity = looseSeverityState(item.severity);
        return item;
      });
    }
    var out = [];
    nodes.forEach(function (n) {
      (n.open_ends || []).forEach(function (oe) {
        var key = nodeKey(n);
        out.push({
          id: key + ":" + (oe.text_hash || oe.text || ""),
          kind: oe.kind || "open",
          source_node: key,
          title: titleLabel(n.title, n.id),
          repo: n.repo || "",
          provider: n.provider || "",
          text: oe.text || "",
          action_hint: openEndHuman(oe),
          age_days: oe.age_days,
          severity: "amber",
          resolve_cmd: oe.text_hash ? "chat-graph resolve " + n.id + " " + oe.text_hash : ""
        });
      });
    });
    return out;
  }
  function uniqNonEmpty(arr) {
    var seen = {}, out = [];
    (arr || []).forEach(function (x) {
      if (x == null || x === "") return;
      if (!seen[x]) { seen[x] = 1; out.push(x); }
    });

  // ===========================================================================
  //  EXCEPTION HARVEST — merged "needs attention" across all four feeds
  // ===========================================================================
  function harvestExceptions() {
    var out = [];
    // chats: sessions carrying open work
    var gc = guard("chats");
    if (gc.ok && gc.data) {
      looseEnds(gc.data).slice(0, 3).forEach(function (o) {
          out.push({ state: looseSeverityState(o.severity), seen: o.first_seen_at || "", tab: "chats",
                     focus: o.source_node || "", openId: o.id || "",
                     problem: titleLabel(o.title, "") + " — " + looseKindLabel(o.kind),
                     impact: "Mission Control found one item not closed yet.",
                     action: o.action_hint || openEndHuman(o),
                     sourceAge: fmtAge(gc.epoch),
                     sourceName: "chat-graph export" });
      });
    }
    // git: repos needing a push/commit or stale branches
    var gg = guard("git");
    if (gg.ok && gg.data && Array.isArray(gg.data.repos)) {
      gg.data.repos.map(function (r) { return { r: r, act: gitAction(r) }; })
        .filter(function (x) { return x.act.state !== "green"; }).slice(0, 2).forEach(function (x) {
          var r = x.r, act = x.act;
          out.push({ state: act.state, seen: gg.env.generated_at || "", tab: "git",
                     problem: r.repo + " — " + act.summary,
                     impact: "The repo state can block landing or trusting current work.",
                     action: act.verb,
                     sourceAge: fmtAge(gg.epoch),
                     sourceName: "scan-unfinished-work + watcher notes" });
        });
    }
    // usage: providers hot / stale
    var gu = guard("usage");
    if (gu.ok && gu.data && Array.isArray(gu.data.providers)) {
      normUsageProviders(gu.data).rows.filter(function (p) {
        var st = usageState(p);
        return st === "red" || st === "amber";
      }).slice(0, 1).forEach(function (p) {
        var st = usageState(p);
          out.push({ state: st, seen: p.name || "", tab: "usage",
                     problem: (p.name || "provider") + " — " + usagePctText(p),
                     impact: "You could pick the wrong model or hit a limit mid-task.",
                     action: p.pace ? ("watch pace " + p.pace) : "watch the burn rate",
                     sourceAge: fmtAge(gu.epoch),
                     sourceName: "usage snapshot" });
      });
    }
    // automation: red / degraded / offline jobs
    var ga = guard("automation");
    if (ga.ok && ga.data && Array.isArray(ga.data.jobs)) {
      ga.data.jobs.filter(function (jb) {
        return jb.state === "red" || jb.state === "degraded" || jb.state === "yellow";
      }).slice(0, 2).forEach(function (jb) {
        if (jb.state === "red" || jb.state === "degraded" || jb.state === "yellow") {
          out.push({ state: jb.state === "red" ? "red" : "amber", seen: jb.label || jb.name || "", tab: "automation",
                     problem: (jb.label || jb.name) + " — " + humanJobState(jb.state),
                     impact: "Background evidence may be stale or missing until this recovers.",
                     action: jb.err_log_tail ? String(jb.err_log_tail).split("\n")[0].slice(0, 120) : "last run didn't finish cleanly",
                     sourceAge: fmtAge(ga.epoch),
                     sourceName: "automation-status" });
        }
      });
    }
    // stable sort by first-seen (blank sinks last but keeps insertion order among equals)
    return out.map(function (e, i) { return { e: e, i: i }; })
      .sort(function (a, b) {
        var ka = a.e.seen || "~", kb = b.e.seen || "~";

  }

  // ===========================================================================
  //  GIT helpers — remote relationship + action verb
  // ===========================================================================
  function gitAction(r) {
    // remote relationship: synced/ahead/behind/diverged/no-remote
    var rel = r.remote || (r.no_remote ? "no-remote" : (r.ahead > 0 && r.behind > 0 ? "diverged" : (r.ahead > 0 ? "ahead" : (r.behind > 0 ? "behind" : "synced"))));
    if (r.dirty) return { state: "amber", verb: "Save changes to Git", summary: (r.dirty_files || "?") + " files changed", rel: rel };
    if (rel === "diverged") return { state: "red", verb: "Reconcile with GitHub", summary: "local and GitHub both changed", rel: rel };
    if (rel === "ahead") return { state: "amber", verb: "Send branch to GitHub", summary: (r.ahead || "?") + " local commits not on GitHub", rel: rel };
    if (rel === "behind") return { state: "amber", verb: "Get GitHub updates", summary: (r.behind || "?") + " commits behind GitHub", rel: rel };
    if (rel === "no-remote") return { state: "amber", verb: "Set up remote or ignore", summary: "not connected to GitHub", rel: rel };
    if (r.detached) return { state: "amber", verb: "Check branch", summary: "not on a named branch", rel: rel };
    if (Array.isArray(r.branches) && r.branches.length) return { state: "amber", verb: "Review old branches", summary: r.branches.length + " old branches", rel: rel };

  // ===========================================================================

  function usageState(p) {
    var pct = numericPct(p.pct);
    if (p.confidence === "stale") return "amber";

      if (pct >= 75) return "amber";
      return "green";
    }
    return "blue";
  }
  function numericPct(value) {

  function isCreditWindow(item) {

    return "no numeric read";
  }
  function usageItems(data) {
    return ((data && data.providers) || []).map(function (pr) {

                 source: pr.source || "local", used: pr.used, unit: pr.unit, resets_in_min: pr.resets_in_min,
                 notes: pr.notes || "", models: pr.models || "", window: pr.window || "", health: pr.health || "" };
      }
      return {
        title: providerLabel(pr.provider) + (pr.window ? " · " + pr.window : ""),
        provider: pr.provider || "",
        pct: pr.used_pct,
        confidence: pr.confidence || "unknown",
        source: pr.source || "local",
        used: pr.tokens_used,
        unit: pr.tokens_used != null ? "tok" : "",
        resets_in_min: pr.resets_in_min,
        notes: pr.notes || "",
        models: pr.models || "",
        window: pr.window || "",
        health: pr.health || ""
      };
    });
  }
  function usageDecision(item) {
    var pct = numericPct(item.pct);
    if (isCreditWindow(item)) {
      return { label: item.confidence === "manual" ? "Watch" : "Can use",
               state: item.confidence === "manual" ? "amber" : "green",
               next: "Use this credit balance, but top it up before it gets tight." };
    }
    if (item.source === "none" || item.health === "absent") {

    }
    if (item.confidence === "stale") {

    if (isFinite(pct) && pct >= 90) {
      return { label: "Wait", state: "red", next: item.resets_in_min != null ? "Wait for the reset or switch tools." : "Switch tools for heavy work." };
    }
    if (isFinite(pct) && pct >= 75) {

    }
    if (item.health === "present" && !isFinite(pct)) {

  // Real usage-snapshot shape -> renderer shape (live fix 2026-07-03: the real
  // feed carries provider/used_pct/window/health/source; the renderer was built
  // against a fixture that invented name/pct. Fixture-shaped rows pass through.)
  function normUsageProviders(data) {
    var rows = [], credits = [], no_data = [];
    ((data && data.providers) || []).forEach(function (pr) {
      if (pr.name != null || pr.pct != null) { rows.push(pr); return; }
      var win = String(pr.window || "");
      if (win.indexOf("credit") === 0) {
        credits.push({ name: (pr.provider || "?") + " " + win.replace(/^credit:?/, ""),
                       remaining: pr.notes || null, resets_in_min: pr.resets_in_min });
        return;
      }
      if (pr.source === "none" || pr.health === "absent") {
        no_data.push({ name: pr.provider || "provider", reason: pr.notes || pr.source || "not wired" });
        return;
      }
      rows.push({ name: (pr.provider || "?") + (win ? " · " + win : ""),
                  pct: pr.used_pct, confidence: pr.confidence,

  // ===========================================================================
  //  GLOBAL STATUS STRIP
  // ===========================================================================
  function fullIngestState(cnt) {
    cnt = cnt || {};
    if (Object.prototype.hasOwnProperty.call(cnt, "ingest_skipped")) {
      if (typeof cnt.ingest_skipped !== "boolean") return "unknown";
      if (cnt.ingest_skipped) return "stale";
    }
    if (!Object.prototype.hasOwnProperty.call(cnt, "last_full_ingest_age_s")) return "unknown";
    var age = cnt.last_full_ingest_age_s;
    if (typeof age !== "number" || !isFinite(age) || age < 0) return "unknown";
    var hasSla = Object.prototype.hasOwnProperty.call(cnt, "full_ingest_sla_s");
    var sla = hasSla ? cnt.full_ingest_sla_s : 30 * 3600;
    if (typeof sla !== "number" || !isFinite(sla) || sla <= 0) return "unknown";
    var computed = age > sla ? "stale" : "fresh";
    var hasState = Object.prototype.hasOwnProperty.call(cnt, "full_ingest_state");
    var hasLegacy = Object.prototype.hasOwnProperty.call(cnt, "full_ingest_stale");
    if (!hasState || !hasLegacy) return "unknown";
    if (cnt.full_ingest_state !== "fresh" && cnt.full_ingest_state !== "stale" &&
        cnt.full_ingest_state !== "unknown") return "unknown";
    if (typeof cnt.full_ingest_stale !== "boolean") return "unknown";
    if (cnt.full_ingest_state === "unknown") return "unknown";
    if (cnt.full_ingest_state !== computed ||
        cnt.full_ingest_stale !== (cnt.full_ingest_state === "stale")) return "unknown";
    return cnt.full_ingest_state;
  }

  function feedSummary() {
    // returns per-tab {state, count} worst-state summary
    var s = {};
    var gc = guard("chats");
    if (gc.ok && gc.data && Array.isArray(gc.data.nodes)) {
      var owe = looseEnds(gc.data).length;
      var cnt = gc.data.counts || {};
      var ingestState = fullIngestState(cnt);
      var staleIngest = ingestState === "stale";
      var unknownIngest = ingestState === "unknown";
      var ingestSkipped = cnt.ingest_skipped === true;
      var chatsTone = (owe || staleIngest || unknownIngest || ingestSkipped) ? "amber" : "green";
      s.chats = { state: worstTone(chatsTone, guardTone(gc)), count: owe };
    } else s.chats = { state: "grey", count: 0 };

    var gg = guard("git");
    if (gg.ok && gg.data && Array.isArray(gg.data.repos)) {
      var bad = gg.data.repos.map(gitAction).filter(function (a) { return a.state !== "green"; });
      var worst = bad.some(function (a) { return a.state === "red"; }) ? "red" : (bad.length ? "amber" : "green");
      s.git = { state: worstTone(worst, guardTone(gg)), count: bad.length };
    } else s.git = { state: "grey", count: 0 };

    var gu = guard("usage");
    if (gu.ok && gu.data && Array.isArray(gu.data.providers)) {
      var states = normUsageProviders(gu.data).rows.map(usageState);
      var w = states.indexOf("red") >= 0 ? "red" : (states.indexOf("amber") >= 0 ? "amber" : "green");
      s.usage = { state: worstTone(w, guardTone(gu)), count: states.filter(function (x) { return x === "red" || x === "amber"; }).length };
    } else s.usage = { state: "grey", count: 0 };

    var ga = guard("automation");
    if (ga.ok && ga.data && Array.isArray(ga.data.jobs)) {
      var ex = ga.data.jobs.filter(function (j) { return j.state === "red" || j.state === "degraded" || j.state === "yellow"; });
      var wa = ga.data.jobs.some(function (j) { return j.state === "red"; }) ? "red" : (ex.length ? "amber" : "green");
      s.automation = { state: worstTone(wa, guardTone(ga)), count: ex.length };

  var HOME_EXPANDED = false;

  function parseDecisionOptions(text) {
    var raw = String(text || "");
    var opts = [];
    var suggested = null;
    // Prefer backtick-wrapped option labels: **`Approve merge`**
    var tick = /\*\*`([^`]+)`\*\*/g, m;
    while ((m = tick.exec(raw)) && opts.length < 6) opts.push(m[1].trim());
    if (!opts.length) {
      // Bold segments that look like choices after em dash / colon patterns
      var bold = /\*\*([^*]{2,80})\*\*/g;
      while ((m = bold.exec(raw)) && opts.length < 6) {
        var label = m[1].replace(/^`|`$/g, "").trim();
        if (/recommended|DECISION NEEDED|Confirmed/i.test(label)) continue;
        if (label.length < 2) continue;
        opts.push(label);
      }
    }
    var rec = raw.match(/recommend(?:ed)?(?:\s+the)?\s+(?:first|1st|option\s*1)/i);
    if (rec && opts.length) suggested = 1;
    else {
      var sug = raw.match(/\(Recommended\)|\*\*Recommended\*\*|— Recommended/i);
      if (sug && opts.length) {
        // pick option whose nearby text mentions Recommended
        for (var i = 0; i < opts.length; i++) {
          var idx = raw.indexOf(opts[i]);
          if (idx >= 0 && /Recommended/i.test(raw.slice(Math.max(0, idx - 40), idx + opts[i].length + 40))) {
            suggested = i + 1; break;
          }
        }
        if (suggested == null) suggested = 1;
      }
    }
    // Shorten long prose into a question line
    var question = raw.replace(/\*\*|`/g, " ").replace(/\s+/g, " ").trim();
    if (question.length > 160) question = question.slice(0, 157) + "…";
    return { question: question || "Decision needs your answer", options: opts.slice(0, 3), suggested: suggested };
  }

  function healthLine() {
    var ga = guard("automation");

      var red = ga.data.jobs.filter(function (j) { return j.state === "red"; }).length;
      var yellow = ga.data.jobs.filter(function (j) {
        return j.state === "yellow" || j.state === "degraded"; }).length;
      if (red) return { tone: "red", text: "Automation: " + red + " red job" + (red === 1 ? "" : "s") + (yellow ? ", " + yellow + " warning" : "") };
      if (yellow) return { tone: "amber", text: "Automation: " + yellow + " warning" + (yellow === 1 ? "" : "s") };
      return { tone: "green", text: "Machinery healthy" };
    }
    return { tone: "grey", text: "Health unknown" };
  }

  function answerCommand(decisionId, n) {

  function renderStrip() {
    var strip = document.getElementById("mc-strip");

  function renderPinnedDecisions(main, limit, opts) {

  function combinedHomeState() {
    var names = ["chats", "git", "usage", "automation", "decisions", "brief"];
    var epochs = [];
    var status = "fresh";
    names.forEach(function (name) {
      var g = guard(name);
      if (g.ok && g.epoch) epochs.push(g.epoch);
      if (!g.ok || g.feedError || g.flag === "stale") status = "attention";
      else if (status !== "attention" && panelStatusText(name, g) !== "fresh") status = "partial";
    });
    return { epoch: epochs.length ? Math.min.apply(null, epochs) : null, status: epochs.length ? status : "no data" };
  }
  function changedSinceText() {

  function summaryCard(title, state, headline, secondary, epoch, extra) {
    var c = h("div", { class: "mc-card" });

    // headline: the number stands on its own, tinted by state — no alarm glyph

    if (extra) hl.appendChild(extra);

  function cardChats() {
    var g = guard("chats");
    if (!g.ok) return summaryCard("Chats", "grey", "—", [g.reason], null);
    var nodes = g.data.nodes || [];
    var owe = looseEnds(g.data).length;
    var cnt = g.data.counts || {};
    var pulse = cnt.new_today ? h("span", { class: "mc-pulse" }, cnt.new_today + " conversations found today") : null;
    // sweep FIX 5: scan_errors_24h was computed in the feed but never surfaced. Show it
    // (amber card + a line) so a silently-degrading transcript scan is visible.
    var scanErr = +cnt.scan_errors_24h || 0;
    var ingestState = fullIngestState(cnt);
    var staleIngest = ingestState === "stale";
    var unknownIngest = ingestState === "unknown";
    var ingestSkipped = cnt.ingest_skipped === true;
    var lines = [owe + " open work item" + (owe === 1 ? "" : "s")];
    if (scanErr > 0) lines.push(scanErr + " chat" + (scanErr > 1 ? "s" : "") + " couldn't be read today");
    if (staleIngest) lines.push("full chat scan is stale");
    if (unknownIngest) lines.push("full chat scan freshness unknown");
    if (ingestSkipped) lines.push("chat refresh skipped — another scan is running");
    var healthLine = guardStatusLine(g);
    if (healthLine) lines.push(healthLine);
    var contentTone = (owe || scanErr || staleIngest || unknownIngest || ingestSkipped) ? "amber" : "green";
    return summaryCard("Chats", worstTone(contentTone, guardTone(g)), nodes.length,
      lines, g.epoch, pulse);
  }
  function cardGit() {
    var g = guard("git");
    if (!g.ok) return summaryCard("Git", "grey", "—", [g.reason], null);
    var repos = g.data.repos || [];
    var acts = repos.map(gitAction);
    var bad = acts.filter(function (a) { return a.state !== "green"; });
    var st = bad.some(function (a) { return a.state === "red"; }) ? "red" : (bad.length ? "amber" : "green");
    var clean = repos.length - bad.length;
    return summaryCard("Git", worstTone(st, guardTone(g)), bad.length,
      [bad.length === 1 ? "1 project needs a hand" : bad.length + " projects need a hand",
       clean + " of " + repos.length + " are clean", guardStatusLine(g)], g.epoch);
  }
  function cardUsage() {
    var g = guard("usage");
    if (!g.ok) return summaryCard("Usage", "grey", "—", [g.reason], null);
    var ps = normUsageProviders(g.data).rows;   // real feed shape (fixes "peak undefined")
    var withPct = ps.filter(function (p) { return isFinite(numericPct(p.pct)); });
    var worst = withPct.map(function (p) { return { p: p, pct: numericPct(p.pct) }; }).sort(function (a, b) { return b.pct - a.pct; })[0];
    var st = ps.map(usageState).indexOf("red") >= 0 ? "red" : (ps.map(usageState).indexOf("amber") >= 0 ? "amber" : "green");
    var head = worst ? (worst.pct + "%") : "OK";
    var hot = ps.filter(function (p) { return p.pace; }).map(function (p) { return p.name + " " + p.pace; })[0];
    return summaryCard("Usage", worstTone(st, guardTone(g)), head,
      [worst ? "most used: " + worst.p.name : ps.length + " AI sources tracked",
       hot ? "running hot: " + hot : "nothing running hot", guardStatusLine(g)], g.epoch);
  }
  function cardAutomation() {
    var g = guard("automation");

    var st = jobs.some(function (j) { return j.state === "red"; }) ? "red" : (ex ? "amber" : "green");
    var unreg = (g.data.unregistered || []).length;
    return summaryCard("Automation", worstTone(st, guardTone(g)), green,

  function sessionMonitorState(n, gitByRepo) {
    var repoState = n.repo && gitByRepo[normRepoKey(n.repo)] ? gitAction(gitByRepo[normRepoKey(n.repo)]) : null;
    if ((n.open_ends || []).length) return { label: "Needs you", tone: "amber", detail: openEndHuman((n.open_ends || [])[0]) };
    if (n.live && isRecent(n.last_activity, 1800)) return { label: "Working", tone: "green", detail: "used in the last 30 minutes" };
    if (n.closeout_seen) return { label: "Done", tone: "grey", detail: "closeout recorded" };
    if (repoState && isRecent(n.last_activity, 86400) && repoState.state === "red") return { label: "Blocked", tone: "red", detail: repoState.summary };
    if (repoState && isRecent(n.last_activity, 86400) && repoState.state === "amber") return { label: "Waiting", tone: "amber", detail: repoState.summary };
    if (!isRecent(n.last_activity, 86400)) return { label: "Stale", tone: "grey", detail: "no recent activity" };
    return { label: "Idle", tone: "blue", detail: "quiet, with no action recorded" };
  }
  function sessionRank(st) {
    var ranks = { "Needs you": 0, Blocked: 1, Working: 2, Waiting: 3, Stale: 4, Idle: 5, Done: 6 };
    return Object.prototype.hasOwnProperty.call(ranks, st.label) ? ranks[st.label] : 9;
  }
  function renderSessionMonitor(main) {
    var gc = guard("chats");

    var rows = (gc.data.nodes || []).map(function (n) {
      return { n: n, st: sessionMonitorState(n, gitByRepo) };
    }).sort(function (a, b) {
      var ra = sessionRank(a.st), rb = sessionRank(b.st);
      if (ra !== rb) return ra - rb;

        h("td", { class: "mc-ellipsis", title: row.n.repo || "" }, providerLabel(row.n.provider) + (row.n.repo ? " / " + row.n.repo : "")),
        h("td", null, glyphSpan(row.st.tone), " ", row.st.label),

    });
    main.appendChild(table);

  function normRepoKey(s) {
    return String(s || "").toLowerCase().replace(/[^a-z0-9]+/g, "");
  }
  function renderActivityHeatmap(main) {
    var gc = guard("chats");
    if (!gc.ok) return;
    var nodes = gc.data.nodes || [];
    var days = 42, today = new Date();
    today = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    var counts = {}, openCounts = {};
    nodes.forEach(function (n) {
      var t = Date.parse(n.last_activity || "");
      if (!isFinite(t)) return;
      var d = new Date(t);
      var key = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
      counts[key] = (counts[key] || 0) + 1;
      if ((n.open_ends || []).length) openCounts[key] = (openCounts[key] || 0) + (n.open_ends || []).length;
    });
    main.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Recent activity" })));
    main.appendChild(h("div", { class: "mc-card-foot" }, "Darker cells mean more chat activity. Amber outlines mean unfinished work touched that day."));
    var wrap = h("div", { class: "mc-heat-wrap mc-panel-table" });
    var frame = h("div", { class: "mc-heatframe" });
    frame.appendChild(h("div", { class: "mc-weekdays" },
      h("span", null, "S"), h("span", null, "M"), h("span", null, "T"), h("span", null, "W"), h("span", null, "T"), h("span", null, "F"), h("span", null, "S")));
    var grid = h("div", { class: "mc-heatmap", title: "Last six weeks of chat activity" });
    var firstDate = new Date(today.getFullYear(), today.getMonth(), today.getDate() - (days - 1));
    var leading = firstDate.getDay();
    for (var pad = 0; pad < leading; pad++) grid.appendChild(h("div", { class: "mc-heat-cell mc-heat-empty", title: "padding" }));
    for (var i = days - 1; i >= 0; i--) {
      var date = new Date(today.getFullYear(), today.getMonth(), today.getDate() - i);
      var stamp = date.getTime();
      var c = counts[stamp] || 0;
      var oc = openCounts[stamp] || 0;
      var level = c >= 4 ? 4 : (c >= 3 ? 3 : (c >= 2 ? 2 : (c >= 1 ? 1 : 0)));
      grid.appendChild(h("div", {
        class: "mc-heat-cell mc-heat-l" + level + (oc ? " mc-heat-open" : ""),
        title: date.toLocaleDateString([], { month: "short", day: "numeric" }) + ": " + c + " chats" + (oc ? ", " + oc + " unfinished item(s)" : "")
      }));
    }
    frame.appendChild(grid);
    wrap.appendChild(frame);
    main.appendChild(wrap);
  }

  //  MAP TAB — the connection diagram (chats = dots, lines = how they connect)
  // ===========================================================================
  var FOCUS_CHAT = null;                 // set by a "go" deep-link; focuses one chat's neighbourhood
  var mapRepo = "";                      // repo filter
  var _cy = null;

  var PROVIDER_COLOR = { claude: "#7c8cff", codex: "#35b98a", cursor: "#e0a534",
    copilot: "#5aa9d6", hermes: "#b07cff", chatgpt: "#9aa0ab" };
  // type -> [colour, dash?, plain phrasing "<this> <verb> <other>"]
  var EDGE_INFO = {
    spawned:        ["#7c8cff", false, "started"],
    audits:         ["#e0a534", false, "audited"],
    references:     ["#5b6272", false, "mentions"],
    continues:      ["#35b98a", true,  "continued from"],
    signaled:       ["#5aa9d6", false, "messaged"],
    same_issue:     ["#5b6272", true,  "shares a topic with"],
    related_manual: ["#b07cff", false, "you linked to"],
    governs:        ["#c98adf", false, "governs"]

  function provColor(p) { return PROVIDER_COLOR[p] || "#8a92a3"; }
  function edgeColor(t) { return (EDGE_INFO[t] || ["#5b6272"])[0]; }
  function edgeVerb(t)  { return (EDGE_INFO[t] || [null, null, t])[2]; }

  function renderRecentPath(main, nodes) {
    var recent = (nodes || []).filter(function (n) { return n.last_activity; })
      .sort(function (a, b) { return Date.parse(b.last_activity) - Date.parse(a.last_activity); })
      .slice(0, 5);
    if (!recent.length) return;

    main.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Recent chat journal" })));
    main.appendChild(h("div", { class: "mc-card-foot" }, "A short trail of what you touched most recently."));
    var list = h("div", { class: "mc-list" });
    recent.forEach(function (n) {
      list.appendChild(h("div", { class: "mc-chatrow" },
        h("span", { class: "mc-provider" }, journalWhen(n.last_activity)),
        h("span", { class: "mc-chatrow-title mc-ellipsis", title: titleLabel(n.title, n.id) }, titleLabel(n.title, n.id)),
        h("span", { class: "mc-provider" }, "AI: " + providerLabel(n.provider)),
        n.repo ? h("span", { class: "mc-repo" }, "Repo: " + n.repo) : null,
        h("span", { class: "mc-chip mc-chip-btn", onclick: function () {
          FOCUS_CHAT = n.key; rerender();
        } }, "Show connections")));
    });
    main.appendChild(list);
  }

  function journalWhen(iso) {
    var d = new Date(iso);
    if (!isFinite(d.getTime())) return "";
    var n = new Date(LOAD_EPOCH * 1000);
    var day = new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    var today = new Date(n.getFullYear(), n.getMonth(), n.getDate()).getTime();
    var label = day === today ? "Today" : (day === today - 86400000 ? "Yesterday" : d.toLocaleDateString([], { month: "short", day: "numeric" }));
    return label + " " + d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  }

  function renderMap(main) {
    var g = guard("chats");
    var head = h("div", { class: "mc-section-head" }, h("h2", { text: "Connection map" }));
    if (g.ok) head.appendChild(ageSpan(g.epoch));
    main.appendChild(head);
    if (!g.ok) { main.appendChild(h("div", { class: "mc-banner mc-banner-red" }, g.reason)); return; }
    appendPanelProvenance(main, "map", g);

    var data = g.data || {}, nodes = data.nodes || [], edges = data.edges || [];
    var byKey = {};
    nodes.forEach(function (n) {
      n.key = String(n.id).indexOf((n.provider || "") + ":") === 0 ? n.id : (n.provider || "") + ":" + n.id;
      byKey[n.key] = n;
    });

    main.appendChild(h("div", { class: "mc-card-secondary" },
      "Each dot is a chat. Lines show how they connect — one chat that started another, an audit of another, a shared topic. Click a dot to see it and reopen it."));
    renderRecentPath(main, nodes);

    if (typeof cytoscape === "undefined") {
      main.appendChild(h("div", { class: "mc-banner mc-banner-amber" },
        "The map needs the installed dashboard — open it with the Mission Control app (or run: dashboard open)."));
      return;
    }

    // legend
    var legend = h("div", { class: "mc-map-legend" });
    Object.keys(EDGE_INFO).forEach(function (t) {
      legend.appendChild(h("span", { class: "mc-legend-item" },
        h("span", { class: "mc-legend-line", style: "border-top-style:" + (EDGE_INFO[t][1] ? "dashed" : "solid") + ";border-top-color:" + EDGE_INFO[t][0] }),
        edgeVerb(t)));
    });
    main.appendChild(legend);

    // controls: repo filter + reset-focus
    var repos = uniq(nodes.map(function (n) { return n.repo; }).filter(Boolean)).sort();
    var controls = h("div", { class: "mc-filters" });
    var sel = h("select", { class: "mc-chip", onchange: function () { mapRepo = sel.value; FOCUS_CHAT = null; rerender(); } });
    sel.appendChild(h("option", { value: "" }, "All repos"));
    repos.forEach(function (r) { var o = h("option", { value: r }, r); if (r === mapRepo) o.selected = true; sel.appendChild(o); });
    controls.appendChild(sel);
    if (FOCUS_CHAT) controls.appendChild(h("span", { class: "mc-chip mc-chip-btn mc-chip-on",
      onclick: function () { FOCUS_CHAT = null; rerender(); } }, "showing one chat's connections — show all ✕"));
    main.appendChild(controls);

    // scope the graph (perf: never dump 7,500 nodes into the engine)
    var scoped = scopeGraph(nodes, edges, byKey);
    var wrap = h("div", { class: "mc-map-wrap" });
    var cont = h("div", { class: "mc-graph", id: "mc-graph" });
    var side = h("div", { class: "mc-map-side", id: "mc-map-side" },
      h("div", { class: "mc-card-foot" }, "Click a dot to see the chat, who it connects to, and reopen it."),
      h("div", { class: "mc-map-summary" },
        h("div", { class: "mc-side-section" }, "Why you are seeing this"),
        h("div", { class: "mc-card-secondary" }, scoped.note)));
    wrap.appendChild(cont); wrap.appendChild(side);
    main.appendChild(wrap);

    // build after layout so the container has real dimensions
    setTimeout(function () { buildCy(cont, scoped, byKey, side, edges, data); }, 0);
  }

  function scopeGraph(nodes, edges, byKey) {
    var inRepo = function (k) { return !mapRepo || (byKey[k] && byKey[k].repo === mapRepo); };
    var adj = {};
    edges.forEach(function (e) {
      if (!byKey[e.src] || !byKey[e.dst]) return;
      (adj[e.src] = adj[e.src] || []).push(e.dst);
      (adj[e.dst] = adj[e.dst] || []).push(e.src);
    });
    var keep = {};
    if (FOCUS_CHAT && byKey[FOCUS_CHAT]) {
      // breadth-first neighbourhood, depth 2, capped
      var seen = {}, frontier = [FOCUS_CHAT], depth = 0;
      seen[FOCUS_CHAT] = true;
      while (frontier.length && depth < 2 && Object.keys(seen).length < 120) {
        var next = [];
        frontier.forEach(function (k) { (adj[k] || []).forEach(function (nb) { if (!seen[nb]) { seen[nb] = true; next.push(nb); } }); });
        frontier = next; depth++;
      }
      keep = seen;
      return { keys: keep, note: "Showing this chat and what it connects to. Pick a repo or click another dot to explore." };
    }
    // default: the most-connected chats in scope, capped for readability
    var CAP = 260;
    var deg = Object.keys(adj).filter(inRepo).map(function (k) { return { k: k, d: adj[k].length }; })
      .sort(function (a, b) { return b.d - a.d; });
    deg.slice(0, CAP).forEach(function (x) { keep[x.k] = true; });
    var total = deg.length;
    var note = total > CAP
      ? "Showing the " + CAP + " most-connected chats" + (mapRepo ? " in " + mapRepo : "") + " of " + total + " with connections — filter by repo or click a chat to focus its connections."
      : (total ? "Showing all " + total + " connected chats" + (mapRepo ? " in " + mapRepo : "") + "." : "No connections to show" + (mapRepo ? " in " + mapRepo : "") + " yet.");
    return { keys: keep, note: note };
  }

  function buildCy(container, scoped, byKey, side, edges, data) {
    var els = [];
    edges = edges || [];
    Object.keys(scoped.keys).forEach(function (k) {
      var n = byKey[k]; if (!n) return;
      els.push({ data: { id: k, label: shortLabel(titleLabel(n.title, n.id)), prov: n.provider || "?",
        live: n.live ? 1 : 0, owe: (n.open_ends || []).length } });
    });
    var seenEdge = {};
    edges.forEach(function (e) {
      if (!scoped.keys[e.src] || !scoped.keys[e.dst]) return;
      var id = e.src + ">" + e.dst + ">" + e.type;
      if (seenEdge[id]) return; seenEdge[id] = true;
      els.push({ data: { id: id, source: e.src, target: e.dst, type: e.type, col: edgeColor(e.type) } });
    });
    if (_cy) { try { _cy.destroy(); } catch (e) {} _cy = null; }
    _cy = cytoscape({
      container: container, elements: els, wheelSensitivity: 0.2,
      style: [
        { selector: "node", style: {
            "background-color": function (n) { return provColor(n.data("prov")); },
            "width": function (n) { return 16 + Math.min(28, n.degree(true) * 3); },
            "height": function (n) { return 16 + Math.min(28, n.degree(true) * 3); },
            "label": "", "color": "#c9cdd6", "font-size": 9,
            "text-margin-y": 4, "text-valign": "bottom", "text-halign": "center",
            "text-max-width": 110, "text-wrap": "ellipsis",
            "border-width": function (n) { return n.data("live") ? 3 : 0; }, "border-color": "#35b98a",
            "transition-property": "background-color", "min-zoomed-font-size": 7 } },
        { selector: "edge", style: {
            "width": 1.5, "line-color": "data(col)", "opacity": 0.55,
            "curve-style": "bezier", "target-arrow-color": "data(col)",
            "target-arrow-shape": "triangle", "arrow-scale": 0.7,
            "line-style": function (e) { return (EDGE_INFO[e.data("type")] || [0, false])[1] ? "dashed" : "solid"; } } },
        { selector: "node:selected", style: { "border-width": 4, "border-color": "#7c8cff", "label": "data(label)" } },
        { selector: ".mc-dim", style: { "opacity": 0.12 } }
      ],
      layout: FOCUS_CHAT
        ? { name: "concentric", concentric: function (n) { return n.id() === FOCUS_CHAT ? 10 : n.degree(true); }, levelWidth: function () { return 2; }, minNodeSpacing: 40, animate: false }

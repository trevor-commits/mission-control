    _cy.on("tap", function (evt) {
      if (evt.target === _cy) {
        side.textContent = "";
        side.appendChild(h("div", { class: "mc-card-foot" }, "Click a dot to see the chat."));
        side.appendChild(h("div", { class: "mc-map-summary" },
          h("div", { class: "mc-side-section" }, "Why you are seeing this"),
          h("div", { class: "mc-card-secondary" }, scoped.note)));
      }
    });
    if (FOCUS_CHAT && byKey[FOCUS_CHAT]) { _cy.$("#" + cssEsc(FOCUS_CHAT)).select(); mapSide(side, FOCUS_CHAT, byKey, edges, data, scoped.note); }
  }

  function mapWhyShown(note, node) {
    if (FOCUS_CHAT) return "Focused on one chat's neighbourhood. Repo filtering is suspended so you can see the full connection path.";
    if (node && node.repo && mapRepo) return "Filtered to " + mapRepo + ".";
    return note;
  }
  function mapSourceHealth(node, data) {
    var staleProviders = (data && data.stale_providers) || [];
    if (staleProviders.indexOf(node.provider) >= 0) return "provider data is stale";
    if ((data && data.counts && data.counts.ingest_skipped) === true) return "chat refresh skipped during the last read";
    return "graph source looked healthy on the last refresh";
  }
  function connectionGroupTitle(edge, key) {
    var incoming = edge.dst === key;
    if (edge.type === "spawned") return incoming ? "Started this chat" : "This chat started";
    if (edge.type === "audits") return incoming ? "Audited this chat" : "This chat audited";
    if (edge.type === "references") return incoming ? "Mentioned this chat" : "This chat mentioned";
    if (edge.type === "continues") return incoming ? "Continued into this chat" : "This chat continued from";
    if (edge.type === "signaled") return incoming ? "Messaged this chat" : "This chat messaged";
    if (edge.type === "related_manual") return "You linked manually";
    return incoming ? "Points to this chat" : "This chat points to";
  }
  function mapSide(side, key, byKey, edges, data, note) {
    var n = byKey[key]; if (!n) return;
    side.textContent = "";
    side.appendChild(h("div", { class: "mc-map-summary" },
      h("div", { class: "mc-side-title" }, titleLabel(n.title, n.id)),
      h("div", { class: "mc-side-meta" },
        "AI: " + providerLabel(n.provider) + (n.repo ? " · repo: " + n.repo : "") + (n.live ? " · working now" : "")),
      chipsLine([
        { label: "Last activity", value: n.last_activity ? journalWhen(n.last_activity) : "unknown" },
        { label: "Unfinished", value: String((n.open_ends || []).length) },
        { label: "Source health", value: mapSourceHealth(n, data) }
      ])));
    side.appendChild(h("div", { class: "mc-side-section" }, "Why you are seeing this"));
    side.appendChild(h("div", { class: "mc-card-secondary" }, mapWhyShown(note, n)));
    // reopen / read buttons
    if (n.resume_cmd) side.appendChild(cmdBtn("Reopen this chat", n.resume_cmd, true));
    if (n.view_cmd) side.appendChild(cmdBtn("Read transcript", n.view_cmd, false));
    // open ends
    var oe = n.open_ends || [];
    if (oe.length) {
      side.appendChild(h("div", { class: "mc-side-section" }, "Unfinished (" + oe.length + ")"));
      oe.slice(0, 5).forEach(function (o) { side.appendChild(h("div", { class: "mc-card-secondary" }, "• " + openEndHuman(o))); });
    }
    // connections in plain words
    edges = edges || [];
    var conns = edges.filter(function (e) { return e.src === key || e.dst === key; });
    if (conns.length) {
      var groups = {}, GROUP_ROW_CAP = 3;
      conns.forEach(function (e) {
        var title = connectionGroupTitle(e, key);
        (groups[title] = groups[title] || []).push(e);
      });
      Object.keys(groups).forEach(function (groupTitle) {
        var groupEdges = groups[groupTitle];
        side.appendChild(h("div", { class: "mc-side-section" }, groupTitle + " (" + groupEdges.length + ")"));
        groupEdges.slice(0, GROUP_ROW_CAP).forEach(function (e) {
          var otherKey = e.src === key ? e.dst : e.src;
          var other = byKey[otherKey];
          var row = h("div", { class: "mc-side-conn", onclick: function () { FOCUS_CHAT = otherKey; rerender(); } },
            h("span", { class: "mc-dot", style: "background:" + provColor(other && other.provider) }),
            h("div", { class: "mc-side-conn-body" },
              h("div", { class: "mc-ellipsis", title: other ? titleLabel(other.title, other.id) : otherKey }, other ? titleLabel(other.title, other.id) : otherKey),
              h("div", { class: "mc-side-conn-meta" },
                h("span", { class: "mc-chip" }, "source: " + sourceLabel(e.source)),
                h("span", { class: "mc-chip" }, "confidence: " + Math.round((+e.confidence || 0) * 100) + "%"))));
          side.appendChild(row);
        });
        if (groupEdges.length > GROUP_ROW_CAP) side.appendChild(h("div", { class: "mc-card-foot" }, "Showing " + GROUP_ROW_CAP + " of " + groupEdges.length + " in this group."));
      });
    }
    side.appendChild(h("div", { class: "mc-side-section" }, ""));
    side.appendChild(h("span", { class: "mc-chip mc-chip-btn", onclick: function () { FOCUS_CHAT = key; rerender(); } }, "Show only this chat's connections"));
  }

  function cmdBtn(label, cmd, primary) {
    return h("button", { class: "mc-btn" + (primary ? " mc-btn-primary" : ""),
      title: cmd, onclick: function (ev) {
        try { if (navigator.clipboard) navigator.clipboard.writeText(cmd); } catch (e) {}
        var b = ev.target; var old = b.textContent; b.textContent = "copied — paste in a terminal";
        setTimeout(function () { b.textContent = old; }, 1400);
      } }, label);
  }
  function shortLabel(s) { s = String(s || ""); return s.length > 26 ? s.slice(0, 24) + "…" : s; }
  function cssEsc(s) { return String(s).replace(/[^a-zA-Z0-9_-]/g, "\\$&"); }

  // ===========================================================================
  //  CHATS TAB
  // ===========================================================================
  var chatFilter = { repo: "", openOnly: false, providers: {} };
  var FOCUS_OPEN_END = null;

  function renderChats(main) {
    var g = guard("chats");
    var p = panel(g, "Chats and unfinished work");
    main.appendChild(p.wrap);
    if (!p.body) return;
    appendPanelProvenance(p.body, "chats", g);
    var data = g.data || {};
    var nodes = data.nodes || [];
    var edges = data.edges || [];
    // export contract: edge endpoints are "provider:id"; nodes carry bare id
    // (live fix 2026-07-03: mismatch made every badge/cluster silently vanish)
    nodes.forEach(function (n) { n.key = nodeKey(n); });
    var openItems = looseEnds(data);
    var openCountByNode = {};
    openItems.forEach(function (o) { if (o.source_node) openCountByNode[o.source_node] = (openCountByNode[o.source_node] || 0) + 1; });

    // filters: repo dropdown, has-open-ends toggle, provider chips
    var repos = uniq(nodes.map(function (n) { return n.repo; }).filter(Boolean)).sort();
    var providers = uniq(nodes.map(function (n) { return providerGroup(n.provider); }).filter(Boolean)).sort();
    var filters = h("div", { class: "mc-filters" });
    var sel = h("select", { class: "mc-chip", onchange: function () { chatFilter.repo = sel.value; rerender(); } });
    sel.appendChild(h("option", { value: "" }, "All repos"));
    repos.forEach(function (r) { var o = h("option", { value: r }, r); if (r === chatFilter.repo) o.selected = true; sel.appendChild(o); });
    filters.appendChild(sel);
    filters.appendChild(h("span", { class: "mc-chip mc-chip-btn" + (chatFilter.openOnly ? " mc-chip-on" : ""),
      onclick: function () { chatFilter.openOnly = !chatFilter.openOnly; rerender(); } }, "Only chats with unfinished work"));
    providers.forEach(function (pr) {
      var on = !chatFilter.providers[pr];
      filters.appendChild(h("span", { class: "mc-chip mc-chip-btn" + (on ? " mc-chip-on" : ""),
        onclick: function () { chatFilter.providers[pr] = !chatFilter.providers[pr]; rerender(); } }, providerLabel(pr)));
    });
    p.body.appendChild(filters);

    if (FOCUS_OPEN_END) p.body.appendChild(h("span", { class: "mc-chip mc-chip-btn mc-chip-on",
      onclick: function () { FOCUS_OPEN_END = null; rerender(); } }, "showing one open item — show all"));

    renderOpenWork(p.body, openItems, nodes, edges);

    var visible = nodes.filter(function (n) {
      if (chatFilter.repo && n.repo !== chatFilter.repo) return false;
      if (chatFilter.openOnly && !openCountByNode[n.key] && !(n.open_ends || []).length) return false;
      if (chatFilter.providers[providerGroup(n.provider)]) return false; // toggled off
      return true;
    });

    if (data.counts && data.counts.new_today)
      p.body.appendChild(h("div", { class: "mc-card-foot" }, h("span", { class: "mc-pulse" }, data.counts.new_today + " conversations found today")));

    // flat rows — size-tiered (live fix 2026-07-03: 7.5k sessions rendered 92k
    // DOM nodes; design rule: >50 sessions = capped table, expand via filters)
    var ROW_CAP = 100;
    visible.sort(function (a, b) { return String(b.last_activity || "") < String(a.last_activity || "") ? -1 : 1; });
    p.body.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Recent chats" })));
    var list = h("div", { class: "mc-list" });
    var byId = {}; nodes.forEach(function (n) { byId[n.key] = n; });
    visible.slice(0, ROW_CAP).forEach(function (n) { list.appendChild(chatRow(n, edges, byId)); });
    if (!visible.length) list.appendChild(h("div", { class: "mc-card-foot" }, "no chats match these filters"));
    if (visible.length > ROW_CAP)
      list.appendChild(h("div", { class: "mc-card-foot" }, "showing newest " + ROW_CAP + " of " + visible.length + " chats — use the filters to narrow"));
    p.body.appendChild(list);
  }

  function renderOpenWork(parent, openItems, nodes, edges) {
    var byKey = {}; (nodes || []).forEach(function (n) { byKey[n.key || nodeKey(n)] = n; });
    var items = (openItems || []).filter(function (o) {
      var n = byKey[o.source_node || ""];
      if (chatFilter.repo && (o.repo || (n && n.repo) || "") !== chatFilter.repo) return false;
      if (n && chatFilter.providers[providerGroup(n.provider)]) return false;
      return true;
    }).sort(function (a, b) {
      if (FOCUS_OPEN_END && a.id === FOCUS_OPEN_END) return -1;
      if (FOCUS_OPEN_END && b.id === FOCUS_OPEN_END) return 1;
      var sr = { red: 0, amber: 1, grey: 2, green: 3 };
      var as = sr[looseSeverityState(a.severity)], bs = sr[looseSeverityState(b.severity)];
      if (as !== bs) return as - bs;
      return (+b.age_days || 0) - (+a.age_days || 0);
    });
    parent.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Open work" })));
    parent.appendChild(h("div", { class: "mc-card-foot" }, "One list of unfinished items from chats, repo todo files, nightly notes, Git state, and the request register."));
    var list = h("div", { class: "mc-list" });
    if (!items.length) list.appendChild(h("div", { class: "mc-card-foot" }, "No open work found in the chat graph."));
    items.slice(0, 50).forEach(function (item) { list.appendChild(openWorkRow(item, byKey, edges)); });
    if (items.length > 50) list.appendChild(h("div", { class: "mc-card-foot" }, "showing highest priority 50 of " + items.length + " open items"));
    parent.appendChild(list);
  }

  function openWorkRow(item, byKey, edges) {
    var n = byKey[item.source_node || ""];
    var title = titleLabel(item.title || (n && n.title), n && n.id) || "Open work";
    var row = h("div", { class: "mc-row" + (FOCUS_OPEN_END && item.id === FOCUS_OPEN_END ? " mc-chip-on" : "") },
      glyphSpan(looseSeverityState(item.severity)),
      h("div", { class: "mc-row-body" },
        h("div", { class: "mc-row-problem mc-ellipsis", title: title }, title + " — " + looseKindLabel(item.kind)),
        h("div", { class: "mc-row-action mc-ellipsis", title: item.text || "" }, item.action_hint || openEndHuman(item)),
        h("div", { class: "mc-row-meta mc-ellipsis" },
          (item.repo ? "Repo: " + item.repo + " · " : "") + ((item.age_days || 0) ? item.age_days + "d old" : "new"))));
    if (item.source_node && n) row.appendChild(h("span", { class: "mc-chip mc-chip-btn", onclick: function () {
      FOCUS_CHAT = item.source_node; location.hash = "#map"; rerender();
    } }, "Show chat"));
    if (item.resolve_cmd) row.appendChild(copyable(item.resolve_cmd, "Hide until refresh"));
    return row;
  }

  function chatRow(n, edges, byId) {
    var row = h("div", { class: "mc-chatrow" });
    row.appendChild(h("span", { class: "mc-chatrow-title mc-ellipsis", title: titleLabel(n.title, n.id) }, titleLabel(n.title, n.id)));
    row.appendChild(h("span", { class: "mc-provider" }, "AI: " + providerLabel(n.provider)));
    if (n.repo) row.appendChild(h("span", { class: "mc-repo" }, "Repo: " + n.repo));
    // lineage badges from incoming edges + one-line parent (composite keys)
    var inc = edges.filter(function (e) { return e.dst === n.key; });
    inc.forEach(function (e) {
      var kind = e.type === "audits" ? "audit" : (e.type === "spawned" || e.type === "continues" ? "worker" : null);
      if (kind) {
        var parent = byId[e.src];
        var lead = e.type === "audits" ? "audited by " : (e.type === "continues" ? "continued from " : "started by ");
        row.appendChild(h("span", { class: "mc-badge mc-badge-" + kind, title: (parent ? titleLabel(parent.title, parent.id) : e.src) }, kind));
        row.appendChild(h("span", { class: "mc-repo mc-ellipsis", title: e.src }, lead + (parent ? titleLabel(parent.title, parent.id) : e.src)));
      }
    });
    // recent activity badge (<30 min)
    if (n.live && isRecent(n.last_activity, 1800)) row.appendChild(h("span", { class: "mc-badge mc-badge-live" }, "working now"));
    // open-ends: >21d collapse to a stale chip, the rest counted live
    var split = splitOpenEnds(n.open_ends);
    if (split.live) row.appendChild(h("span", { class: "mc-badge" }, split.live + " unfinished"));
    if (split.stale) row.appendChild(h("span", { class: "mc-badge mc-badge-stale" }, split.stale + " old unfinished"));
    if (n.resume_cmd) row.appendChild(copyable(n.resume_cmd, "Reopen this chat"));
    if (n.view_cmd) row.appendChild(copyable(n.view_cmd, "Read transcript"));
    return row;
  }

  // ===========================================================================
  //  GIT TAB
  // ===========================================================================
  function renderGit(main) {
    var g = guard("git");
    var p = panel(g, "Git: work to commit, push, or clean up");
    main.appendChild(p.wrap);
    if (!p.body) return;
    appendPanelProvenance(p.body, "git", g);
    var data = g.data || {};
    var repos = data.repos || [];
    var acts = repos.map(function (r) { return { r: r, a: gitAction(r) }; });
    var dirty = acts.filter(function (x) { return x.r.dirty; }).length;
    var unpushed = acts.filter(function (x) { return x.a.rel === "ahead"; }).length;
    var flags = (data.watcher_flags || []);

    // summary strip
    p.body.appendChild(h("div", { class: "mc-filters" },
      h("span", { class: "mc-chip" }, (data.findings_total != null ? data.findings_total : "?") + " items found"),
      h("span", { class: "mc-chip" }, dirty + " with local changes"),
      h("span", { class: "mc-chip" }, unpushed + " not sent to GitHub"),
      h("span", { class: "mc-chip" }, flags.length + " watcher notes")));

    // scan-unfinished-work table (unfinished repos only; clean collapse)
    var bad = acts.filter(function (x) { return x.a.state !== "green"; });
    var clean = acts.filter(function (x) { return x.a.state === "green"; });
    var table = h("table", { class: "mc-table" });
    table.appendChild(h("tr", null,
      h("th", null, "Project"), h("th", null, "Branch"), h("th", null, "GitHub"),
      h("th", null, "Problem"), h("th", null, "Next action")));
    bad.forEach(function (x) {
      var relCls = REL_CLASS[x.a.rel] || "mc-state-grey";
      table.appendChild(h("tr", null,
        h("td", { class: "mc-ellipsis", title: x.r.repo, style: "max-width:220px" }, x.r.repo),
        h("td", { class: relCls }, x.r.branch || "?"),
        h("td", { class: relCls }, relSymbol(x.a.rel) + " " + (REL_TEXT[x.a.rel] || x.a.rel)),
        h("td", null, glyphSpan(x.a.state), " ", x.a.summary),
        h("td", { class: "mc-action-verb" }, x.a.verb)));
    });
    p.body.appendChild(table);
    if (clean.length) {
      var expanded = { on: false };
      var line = h("div", { class: "mc-collapse" }, glyphSpan("green"), " " + clean.length + " projects are clean (click to show)");
      var sub = h("div", { style: "display:none" });
      clean.forEach(function (x) { sub.appendChild(h("div", { class: "mc-card-secondary" }, x.r.repo + " - " + (x.r.branch || "") + " matches GitHub")); });
      line.addEventListener("click", function () { expanded.on = !expanded.on; sub.style.display = expanded.on ? "block" : "none"; });
      p.body.appendChild(line); p.body.appendChild(sub);
    }

    // separate watcher-flags list
    if (flags.length) {
      p.body.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Watcher notes" })));
      var ft = h("table", { class: "mc-table" });
      ft.appendChild(h("tr", null, h("th", null, "Project"), h("th", null, "Problem"), h("th", null, "Detail")));
      flags.forEach(function (f) {
        ft.appendChild(h("tr", null,
          h("td", null, f.repo || "?"),
          h("td", null, glyphSpan(f.state || "amber"), " ", f.flag || ""),
          h("td", { class: "mc-ellipsis", title: f.detail || "", style: "max-width:420px" }, f.detail || "")));
      });
      p.body.appendChild(ft);
    }

    // groom strip
    var groom = data.groom;
    if (groom) {
      var decide = (groom.decide || []);
      var strip = h("div", { class: "mc-card" });
      strip.appendChild(h("div", { class: "mc-card-title" }, "Automatic cleanup"));
      strip.appendChild(h("div", { class: "mc-card-secondary mc-num" },
        "last run " + (groom.last_run ? groom.last_run : "?") + " · " +
        (groom.done != null ? groom.done : "?") + " done · " + (groom.failed != null ? groom.failed : "?") + " failed"));
      if (decide.length) {
        strip.appendChild(h("div", { class: "mc-card-secondary" }, "Needs your decision:"));
        decide.forEach(function (d) { strip.appendChild(h("div", { class: "mc-card-foot mc-ellipsis", title: d }, "• " + d)); });
      }
      p.body.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Cleanup" })));
      p.body.appendChild(strip);
    }
  }
  var REL_SYMBOL = { synced: "=", ahead: "↑", behind: "↓", diverged: "⇅", "no-remote": "∅" };
  function relSymbol(rel) { return REL_SYMBOL[rel] || "?"; }

  // ===========================================================================
  //  USAGE TAB
  // ===========================================================================
  var countdowns = []; // {el, targetEpoch}

  function renderUsage(main) {
    countdowns = [];
    var g = guard("usage");
    var p = panel(g, "Usage: which AI has room");
    main.appendChild(p.wrap);
    if (!p.body) return;
    appendPanelProvenance(p.body, "usage", g);
    var data = g.data || {};
    var nu = normUsageProviders(data);
    p.body.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Decision cards" })));
    p.body.appendChild(h("div", { class: "mc-card-foot" }, "Each card answers whether you can use that source now, how trustworthy the reading is, and what to do next."));
    var grid = h("div", { class: "mc-decision-grid" });
    usageItems(data).forEach(function (item) { grid.appendChild(renderUsageDecisionCard(item, g.epoch)); });
    p.body.appendChild(grid);

    // waste table
    if ((nu.waste || []).length) {
      p.body.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Unused capacity" })));
      var wt = h("table", { class: "mc-table" });
      wt.appendChild(h("tr", null, h("th", null, "AI"), h("th", null, "Window"), h("th", null, "Unused")));
      nu.waste.forEach(function (w) {
        wt.appendChild(h("tr", null,
          h("td", null, w.label || "?"),
          h("td", { class: "mc-ellipsis", title: w.detail || "", style: "max-width:420px" }, w.detail || ""),
          h("td", { class: "mc-num" }, w.cost != null ? w.cost : "")));
      });
      p.body.appendChild(wt);
    }
    tickCountdowns();
  }

  function tickCountdowns() {
    countdowns.forEach(function (c) {
      var rem = c.target - nowS();
      if (rem < 0) { c.el.textContent = "reset time passed; waiting for next refresh"; c.el.className = "mc-countdown mc-state-amber"; }
      else {
        var hh = Math.floor(rem / 3600), mm = Math.floor((rem % 3600) / 60), ss = rem % 60;
        c.el.textContent = "resets in " + hh + "h" + pad(mm) + "m" + pad(ss) + "s";
        c.el.className = "mc-countdown";
      }
    });
  }
  function pad(n) { return n < 10 ? "0" + n : String(n); }

  // ===========================================================================
  //  MORNING BRIEF TAB
  // ===========================================================================
  function renderBrief(main) {
    var g = guard("brief");
    var p = panel(g, "Morning Brief");
    main.appendChild(p.wrap);
    if (!p.body) return;
    appendPanelProvenance(p.body, "brief", g);
    var data = g.data || {};
    if ((data.stale_required_inputs || []).length) {
      p.body.appendChild(h("div", { class: "mc-banner mc-banner-red" },
        "STALE DATA WARNING — missing or stale: " + data.stale_required_inputs.join(", ")));
    }
    p.body.appendChild(chipsLine([
      { label: "Brief", value: data.brief_id || "unknown" },
      { label: "Delivery", value: (data.delivery && data.delivery.state) || "unknown" }
    ]));
    (data.sections || []).forEach(function (section) {
      p.body.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: section.title || "Section" })));
      var list = h("div", { class: "mc-attention" });
      appendBriefLines(list, section);
      p.body.appendChild(list);
    });
  }

  // ===========================================================================
  //  AUTOMATION TAB
  // ===========================================================================
  function renderAutomation(main) {
    var g = guard("automation");
    var p = panel(g, "Background jobs");
    main.appendChild(p.wrap);
    if (!p.body) return;
    appendPanelProvenance(p.body, "automation", g);
    var data = g.data || {};
    if (data.launchctl_note) p.body.appendChild(h("div", { class: "mc-banner mc-banner-amber" }, data.launchctl_note));
    if (data.t7_mounted === false) p.body.appendChild(h("div", { class: "mc-banner mc-banner-blue" }, "T7 offload drive not mounted — media-backed evidence shows offline, not failed"));
    var grid = h("div", { class: "mc-svc-grid" });
    (data.jobs || []).forEach(function (jb) {
      var card = h("div", { class: "mc-svc" });
      var head = h("div", { class: "mc-svc-head" },
        glyphSpan(jb.state),
        h("span", { class: "mc-svc-name mc-ellipsis", title: jb.name || "" }, jb.label || jb.name || "?"),
        h("span", { class: "mc-provider" }, jb.kind ? "schedule: " + jb.kind : ""));
      card.appendChild(head);
      if (jb.state === "awaiting-activation") {
        card.appendChild(h("div", { class: "mc-card-secondary" },
          "Status: awaiting activation — this job is not installed or scheduled yet"));
      }
      var age = jb.evidence_age_s != null ? fmtAgeS(jb.evidence_age_s) : "never ran";
      var retryLabel = jb.retry_schedule ? " · retries " + jb.retry_schedule : "";
      card.appendChild(h("div", { class: "mc-card-secondary mc-num" }, "last evidence " + age + " · " + (jb.schedule || "") + retryLabel));
      if (jb.state === "awaiting-activation") {
        card.appendChild(h("div", { class: "mc-card-secondary" }, "Next run: available after activation"));
      } else if (jb.next_run_epoch != null) {
        var nextLabel;
        try { nextLabel = new Date((+jb.next_run_epoch) * 1000).toLocaleString([], { dateStyle: "short", timeStyle: "short" }); }
        catch (e) { nextLabel = jb.next_run_estimate || String(jb.next_run_epoch); }
        card.appendChild(h("div", { class: "mc-card-secondary mc-num" }, "Next run: " + nextLabel));
      } else if (jb.kind !== "keepalive" && jb.state !== "retired") {
        card.appendChild(h("div", { class: "mc-card-secondary" }, "Next run: not estimated for this schedule"));
      }
      var recentRuns = Array.isArray(jb.recent_runs) ? jb.recent_runs : [];
      if (jb.history_confidence === "trusted") {
        var failedRuns = recentRuns.filter(function (run) { return run.result === "failure"; }).length;
        card.appendChild(h("div", { class: "mc-card-secondary" },
          "Run history: " + recentRuns.length + " distinct · " + failedRuns + " failed · failure streak " + (+jb.failure_streak || 0)));
        var runStrip = h("div", { class: "mc-run-strip", title: "Oldest to newest distinct runs" });
        recentRuns.forEach(function (run) {
          runStrip.appendChild(dot(run.result === "failure" ? "red" : "green"));
        });
        card.appendChild(runStrip);
      } else {
        card.appendChild(h("div", { class: "mc-card-secondary" }, "Run history unavailable — no stable run marker"));
      }
      if (jb.run_cmd) card.appendChild(copyable(jb.run_cmd, "Run now"));
      if (jb.err_log_tail) {
        var d = { on: false };
        var toggle = h("div", { class: "mc-collapse" }, "Show last error");
        var drawer = h("div", { class: "mc-drawer", style: "display:none" }, String(jb.err_log_tail));
        toggle.addEventListener("click", function () { d.on = !d.on; drawer.style.display = d.on ? "block" : "none"; toggle.textContent = (d.on ? "Hide last error" : "Show last error"); });
        card.appendChild(toggle); card.appendChild(drawer);
      }
      grid.appendChild(card);
    });
    p.body.appendChild(grid);

    // unregistered bucket
    var unreg = data.unregistered || [];
    if (unreg.length) {
      p.body.appendChild(h("div", { class: "mc-section-head" }, h("h2", { text: "Running jobs not watched yet" })));
      p.body.appendChild(h("div", { class: "mc-card-foot" }, "These background jobs are running, but Mission Control is not watching them yet."));
      unreg.forEach(function (u) { p.body.appendChild(h("div", { class: "mc-card-secondary mc-mono mc-ellipsis", title: u }, "○ " + u)); });
    }
  }
  function fmtAgeS(s) {
    if (s < 0) return "clock skew";
    if (s < 60) return Math.round(s) + "s ago";
    if (s < 3600) return Math.floor(s / 60) + "m ago";
    if (s < 86400) return Math.floor(s / 3600) + "h ago";
    return Math.floor(s / 86400) + "d ago";
  }

  function uniq(a) { var s = {}, o = []; a.forEach(function (x) { if (!s[x]) { s[x] = 1; o.push(x); } }); return o; }
  function isRecent(iso, sec) { if (!iso) return false; var t = Date.parse(iso) / 1000; return isFinite(t) && (nowS() - t) < sec; }
  function splitOpenEnds(oe) {
    // >21 days old collapses to a "stale" chip; age from age_days or first_seen when present
    var live = 0, stale = 0;
    (oe || []).forEach(function (o) {
      var days = o.age_days;
      if (days == null && o.first_seen) { var t = Date.parse(o.first_seen); if (isFinite(t)) days = (Date.now() - t) / 86400000; }
      if (days != null && days > 21) stale++; else live++;
    });
    return { live: live, stale: stale };
  }

  // ===========================================================================
  //  ROUTER + lifecycle
  // ===========================================================================
  var TABS = [["home", "Home"], ["brief", "Brief"], ["map", "Map"], ["chats", "Chats"], ["git", "Git"], ["usage", "Usage"], ["automation", "Automation"]];
  // pure render functions, spec shape render.<tab>(feed, el) reading window.MC.feeds.*
  var render = {
    home:       function (feed, el) { renderHome(el); },
    brief:      function (feed, el) { renderBrief(el); },
    map:        function (feed, el) { renderMap(el); },
    chats:      function (feed, el) { renderChats(el); },
    git:        function (feed, el) { renderGit(el); },
    usage:      function (feed, el) { renderUsage(el); },
    automation: function (feed, el) { renderAutomation(el); }
  };
  var RENDER = render;

  function currentTab() {
    var h0 = (location.hash || "").replace(/^#/, "");
    return RENDER[h0] ? h0 : "home";
  }
  function renderNav() {
    var nav = document.getElementById("mc-nav");
    nav.textContent = "";
    var cur = currentTab();
    TABS.forEach(function (t) {
      nav.appendChild(h("a", { class: "mc-tab" + (t[0] === cur ? " mc-tab-active" : ""),
        href: "#" + t[0] }, t[1]));
    });
  }
  function rerender() {
    renderStrip();
    renderNav();
    var main = document.getElementById("mc-main");
    main.textContent = "";
    var cur = currentTab();
    render[cur](MC.feeds[cur], main);
  }

  window.addEventListener("hashchange", rerender);

  // 60s reload, paused while hidden; reload on focus if page stale >60s
  setInterval(function () { if (!document.hidden) location.reload(); }, 60000);
  window.addEventListener("focus", function () { if (nowS() - LOAD_EPOCH > 60) location.reload(); });
  document.addEventListener("visibilitychange", function () { if (!document.hidden && nowS() - LOAD_EPOCH > 60) location.reload(); });
  // countdowns tick every second
  setInterval(tickCountdowns, 1000);

  rerender();
})();
</script>
</body>
</html>
